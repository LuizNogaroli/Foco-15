<!DOCTYPE html>
<html lang="pt-BR">
<head>

    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Homologação Ministerial</title>
    <link rel="stylesheet" href="manifestacao-styles.css?v=1782355313469">
</head>
<body>
    <div class="container">
        <section class="card etapa-card">
            <header class="card-header etapa-header">
                <div class="titulo">
                    <span class="icone">📋</span>
                    <span>Gabinete - Homologação Final</span>
                </div>
                <div class="acoes">
                    <span class="status status-pendente">⏳ Pendente</span>
                    <span class="seta">▲</span>
                </div>
            </header>
            <div class="card-body etapa-body">
                <div class="origem info-origem">
                    Origem: <span style="font-weight: bold;">Comissão de Destinações Especiais (CDE)</span>, em <span style="font-weight: bold;">27/05/2026 11:00</span>
                </div>
                
                <div class="pergunta">Decisão Superior:</div>
                <div class="opcoes radio-group">
                    <div>
                        <label class="opcao radio-option">
                            <input type="radio" name="decisao_final" value="homologado" />
                            <span class="opcao-texto">Homologo a deliberação da CDE e autorizo a conclusão do processo.</span>
                        </label>
                    </div>
                    <div>
                        <label class="opcao radio-option">
                            <input type="radio" name="decisao_final" value="restituir" />
                            <span class="opcao-texto">Restituo o processo para esclarecimentos adicionais.</span>
                        </label>
                    </div>
                </div>

                <div class="campo-observacoes">
                    <label for="observacoes_gabinete">Despacho de Gabinete:</label>
                    <textarea id="observacoes_gabinete" placeholder="Registre as orientações finais da autoridade máxima."></textarea>
                </div>

                <button class="botao-concluir" type="button" disabled>
                    ✍ Concluir Processo
                </button>
            </div>
        </section>
    </div>
    <script src="manifestacao-scripts.js?v=1782355313469"></script>
    <script src="sync.js?v=1782355313469"></script>
</body>
</html>
