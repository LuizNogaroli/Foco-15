<!DOCTYPE html>
<html lang="pt-BR">
<head>

    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UC-Coordenação-Geral</title>
    <link rel="stylesheet" href="manifestacao-styles.css?v=1782355313469">
</head>
<body>
    <div class="container">
        <section class="card etapa-card">
            <header class="card-header etapa-header">
                <div class="titulo">
                    <span class="icone">📋</span>
                    <span>Coordenação-Geral</span>
                </div>
                <div class="acoes">
                    <span class="status status-pendente">⏳ Pendente</span>
                    <span class="seta">▲</span>
                </div>
            </header>

            <div class="card-body etapa-body">
                <div class="origem info-origem">
                    Origem: <span style="font-weight: bold;">Equipe Técnica Central</span>, em <span style="font-weight: bold;">26/05/2026 08:30</span>
                </div>
                
                <div class="pergunta">Manifestação da Coordenação-Geral:</div>

                <div class="opcoes radio-group">
                    <div>
                        <label class="opcao radio-option">
                            <input type="radio" name="cg" value="apto" />
                            <span class="opcao-texto">Proposta reúne elementos suficientes para apreciação da CDE.</span>
                        </label>
                        <!-- <span class="opcao-descricao">[Detalhes: Proposta apta para envio à CDE.]</span> -->
                    </div>
                    <div>
                        <label class="opcao radio-option">
                            <input type="radio" name="cg" value="suficiente_condicionantes" />
                            <span class="opcao-texto">Proposta reúne elementos suficientes com condicionantes.</span>
                        </label>
                        <!-- <span class="opcao-descricao">[Detalhes: Observações devem detalhar as condicionantes.]</span> -->
                    </div>
                    <div>
                        <label class="opcao radio-option">
                            <input type="radio" name="cg" value="necessita_complementacao" />
                            <span class="opcao-texto">Proposta necessita de complementação antes de ser submetida à CDE.</span>
                        </label>
                        <!-- <span class="opcao-descricao">[Detalhes: Devolver para a Equipe Técnica.]</span> -->
                    </div>
                </div>

                <div class="campo-observacoes">
                    <label for="observacoes_coord_geral">Observações:</label>
                    <textarea id="observacoes_coord_geral" placeholder="Registre eventuais ressalvas, condicionantes ou orientações."></textarea>
                </div>

                <button class="botao-concluir" type="button" disabled>
                    ✍ Concluir manifestação
                </button>
            </div>
        </section>
    </div>
    <script src="manifestacao-scripts.js?v=1782355313469"></script>
    <script src="sync.js?v=1782355313469"></script>
</body>
</html>
