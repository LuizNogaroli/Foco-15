<!DOCTYPE html>
<html lang="pt-BR">
<head>

    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UC-Diretoria</title>
    <link rel="stylesheet" href="manifestacao-styles.css?v=1782355313469">
</head>
<body>
    <div class="container">
        <section class="card etapa-card">
            <header class="card-header etapa-header">
                <div class="titulo">
                    <span class="icone">📋</span>
                    <span>Diretoria</span>
                </div>
                <div class="acoes">
                    <span class="status status-pendente">⏳ Pendente</span>
                    <span class="seta">▲</span>
                </div>
            </header>

            <div class="card-body etapa-body">
                <div class="origem info-origem">
                    Origem: <span style="font-weight: bold;">Coordenação-Geral</span>, em <span style="font-weight: bold;">26/05/2026 09:20</span>
                </div>
                
                <div class="pergunta">Manifestação da Diretoria:</div>

                <div class="opcoes radio-group">
                    <div>
                        <label class="opcao radio-option">
                            <input type="radio" name="dir" value="submeter" />
                            <span class="opcao-texto">Submeto a proposta à Comissão de Destinações Especiais (CDE).</span>
                        </label>
                        <!-- <span class="opcao-descricao">[Detalhes: Proposta será encaminhada para apreciação da CDE.]</span> -->
                    </div>
                    <div>
                        <label class="opcao radio-option">
                            <input type="radio" name="dir" value="restituir" />
                            <span class="opcao-texto">Restituo o processo à SPU/UF para complementação.</span>
                        </label>
                        <!-- <span class="opcao-descricao">[Detalhes: Processo será devolvido à SPU/UF.]</span> -->
                    </div>
                </div>

                <div class="campo-observacoes">
                    <label for="observacoes_diretoria">Observações:</label>
                    <textarea id="observacoes_diretoria" placeholder="Registre eventuais ressalvas, condicionantes ou orientações."></textarea>
                </div>

                <button class="botao-concluir" type="button" disabled>
                    ✍ Concluir Manifestação
                </button>
            </div>
        </section>
    </div>
    <script src="manifestacao-scripts.js?v=1782355313469"></script>
    <script src="sync.js?v=1782355313469"></script>
</body>
</html>
