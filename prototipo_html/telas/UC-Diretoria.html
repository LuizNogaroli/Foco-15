<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UC-Diretoria</title>
    <link rel="stylesheet" href="styles.css"> <!-- Link to the new CSS file -->
</head>
<body>
    <div class="container">
        <!--h1 class="titulo-pagina">UC-Diretoria</h1-->





        <!-- Diretoria - Expanded -->
        <section class="card etapa-card">
            <header class="card-header etapa-header">
                <div class="titulo">
                    <span class="icone">📋</span>
                    <span>Diretoria</span>
                </div>

                <div class="acoes">
                    <span class="status status-pendente">⏳ Pendente</span>
                    <span class="seta">▲</span>
                </div>
            </header>

            <div class="card-body etapa-body">
                <div class="origem info-origem">
                    Origem: <span style="font-weight: bold;">[Nome de quem enviou]</span>, em <span style="font-weight: bold;">[Timestamp de recebimento]</span>
                </div>
                
                <div class="pergunta">Manifestação da Diretoria:</div>

                <div class="opcoes radio-group">
                    <div>
                        <label class="opcao radio-option">
                            <input type="radio" name="manifestacao_diretoria" value="submeter_cde" />
                            <span class="opcao-texto">Submeto a proposta à Comissão de Destinações Especiais (CDE).</span>
                        </label>
                        <span class="opcao-descricao">
                            [Detalhes: Proposta será encaminhada para apreciação da CDE.]
                        </span>
                    </div>
                    <div>
                        <label class="opcao radio-option">
                            <input type="radio" name="manifestacao_diretoria" value="restituir_spu_uf" />
                            <span class="opcao-texto">Restituo o processo à SPU/UF para complementação.</span>
                        </label>
                        <span class="opcao-descricao">
                            [Detalhes: Processo será devolvido à SPU/UF para complementação.]
                        </span>
                    </div>
                </div>

                <!-- Observações - Incluído como campo comum, embora não explicitamente mostrado em todos os PDFs da Diretoria -->
                <div class="campo-observacoes">
                    <label for="observacoes_diretoria">Observações:</label>
                    <textarea id="observacoes_diretoria" placeholder="Registre eventuais ressalvas, condicionantes, inconsistências identificadas ou orientações para complementação da proposta."></textarea>
                </div>

                <button class="botao-concluir" type="button" disabled>
                    ✍ Concluir Manifestação
                </button>
            </div>
        </section>
    </div>
    <script src="scripts.js"></script>
</body>
</html>
