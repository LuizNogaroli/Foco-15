<!DOCTYPE html>
<html lang="pt-BR">
<head>

    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UF-Superintendência</title>
    <link rel="stylesheet" href="manifestacao-styles.css?v=1782355313469">
</head>
<body>
    <div class="container">
        <section class="card etapa-card">
            <header class="card-header etapa-header">
                <div class="titulo">
                    <span class="icone">📋</span>
                    <span>Superintendência</span>
                </div>
                <div class="acoes">
                    <span class="status status-pendente">⏳ Pendente</span>
                    <span class="seta">▲</span>
                </div>
            </header>

            <div class="card-body etapa-body">
                <div class="origem info-origem">
                    Origem: <span style="font-weight: bold;">Coordenação de Destinação</span>, em <span style="font-weight: bold;">25/05/2026 14:00</span>
                </div>
                
                <hr style="margin-top: 30px; margin-bottom: 30px; border: 0; border-top: 1px solid #eee;">
                
                <!-- Aspectos de Interesse Público -->
                <div class="pergunta">Aspectos de Interesse Público</div>
                <div class="opcoes radio-group">
                    <div>
                        <label class="opcao radio-option">
                            <input type="radio" name="aspectos_interesse_publico" value="consistente" />
                            <span class="opcao-texto">Evidenciado de forma consistente</span>
                        </label>
                    </div>
                    <div>
                        <label class="opcao radio-option">
                            <input type="radio" name="aspectos_interesse_publico" value="ajustes" />
                            <span class="opcao-texto">Evidenciado com necessidade de ajustes</span>
                        </label>
                    </div>
                    <div>
                        <label class="opcao radio-option">
                            <input type="radio" name="aspectos_interesse_publico" value="nao_demonstrado" />
                            <span class="opcao-texto">Não suficientemente demonstrado</span>
                        </label>
                    </div>
                </div>

                <!-- Escolha do Destinatário -->
                <div class="pergunta">Escolha do Destinatário</div>
                <div class="opcoes radio-group">
                    <div>
                        <label class="opcao radio-option">
                            <input type="radio" name="escolha_destinatario" value="consistente" />
                            <span class="opcao-texto">Fundamentação consistente</span>
                        </label>
                    </div>
                    <div>
                        <label class="opcao radio-option">
                            <input type="radio" name="escolha_destinatario" value="ressalvas" />
                            <span class="opcao-texto">Fundamentação suficiente com ressalvas</span>
                        </label>
                    </div>
                    <div>
                        <label class="opcao radio-option">
                            <input type="radio" name="escolha_destinatario" value="insuficiente" />
                            <span class="opcao-texto">Fundamentação insuficiente</span>
                        </label>
                    </div>
                </div>

                <!-- Impactos sociais, territoriais e ambientais -->
                <div class="pergunta">Impactos sociais, territoriais e ambientais</div>
                <div class="opcoes radio-group">
                    <div>
                        <label class="opcao radio-option">
                            <input type="radio" name="impactos" value="positivo_relevante" />
                            <span class="opcao-texto">Impacto positivo relevante</span>
                        </label>
                    </div>
                    <div>
                        <label class="opcao radio-option">
                            <input type="radio" name="impactos" value="positivo_moderado" />
                            <span class="opcao-texto">Impacto positivo moderado</span>
                        </label>
                    </div>
                    <div>
                        <label class="opcao radio-option">
                            <input type="radio" name="impactos" value="neutro" />
                            <span class="opcao-texto">Impacto neutro</span>
                        </label>
                    </div>
                    <div>
                        <label class="opcao radio-option">
                            <input type="radio" name="impactos" value="adverso" />
                            <span class="opcao-texto">Impacto potencialmente adverso</span>
                        </label>
                    </div>
                </div>

                <!-- Regime de destinação -->
                <div class="pergunta">Regime de destinação</div>
                <div class="origem info-origem" style="margin-bottom: 20px;">
                    ℹ Regime proposto pelo analista: Cessão de uso gratuita
                </div>
                <div class="opcoes radio-group">
                    <div>
                        <label class="opcao radio-option">
                            <input type="radio" name="regime_destinacao" value="concordo" />
                            <span class="opcao-texto">Concordo.</span>
                        </label>
                    </div>
                    <div>
                        <label class="opcao radio-option">
                            <input type="radio" name="regime_destinacao" value="nao_concordo" />
                            <span class="opcao-texto">Não concordo.</span>
                        </label>
                    </div>
                </div>
                
                <div class="campo-observacoes">
                    <label for="regime_desejado">Selecione o regime de destinação desejado:</label>
                    <select id="regime_desejado">
                        <option value="">Selecione...</option>
                        <option value="cessao_onerosa">Cessão de Uso Onerosa</option>
                        <option value="alienacao">Alienação</option>
                        <option value="doacao">Doação</option>
                    </select>
                </div>

                <!-- Deliberação -->
                <div class="pergunta">Deliberação</div>
                <div class="opcoes radio-group">
                    <div>
                        <label class="opcao radio-option">
                            <input type="radio" name="deliberacao" value="aprovo_proposta" />
                            <span class="opcao-texto">Favorável à proposta.</span>
                        </label>
                    </div>
                    <div>
                        <label class="opcao radio-option">
                            <input type="radio" name="deliberacao" value="aprovo_condicionantes" />
                            <span class="opcao-texto">Favorável, com ressalvas.</span>
                        </label>
                    </div>
                    <div>
                        <label class="opcao radio-option">
                            <input type="radio" name="deliberacao" value="diligencia" />
                            <span class="opcao-texto">Necessária complementação de informações/documentos.</span>
                        </label>
                    </div>
                    <div>
                        <label class="opcao radio-option">
                            <input type="radio" name="deliberacao" value="devolver_equipe" />
                            <span class="opcao-texto">Devolver para Equipe SPU/UF.</span>
                        </label>
                    </div>
                    <div>
                        <label class="opcao radio-option">
                            <input type="radio" name="deliberacao" value="indefiro" />
                            <span class="opcao-texto">Cancelamento.</span>
                        </label>
                    </div>
                </div>

                <div class="campo-observacoes">
                    <label for="observacoes_superintendencia">Observações:</label>
                    <textarea id="observacoes_superintendencia" placeholder="Registre eventuais ressalvas, condicionantes ou orientações."></textarea>
                </div>

                <button class="botao-concluir" type="button" disabled>
                    ✍ Concluir manifestação
                </button>
            </div>
        </section>
    </div>
    <script src="manifestacao-scripts.js?v=1782355313469"></script>
    <script src="sync.js?v=1782355313469"></script>
</body>
</html>
