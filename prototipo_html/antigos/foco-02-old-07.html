<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FOCO-02 — Identificação, Ocupação e Restrições</title>
    <link rel="stylesheet" href="styles-forms.css">
    <link rel="stylesheet" href="hints.css">
    <style>
        /* CSS para ocultar blocos condicionais inicialmente */
        #bloco31_obs, #bloco35_obs, #bloco38_0, #bloco39_0, 
        #bloco310_0, #bloco311_0, #bloco312_0, #bloco313_0,
        #bloco221_obs, #bloco223_obs {
            display: none;
        }
    </style>
</head>
<body>
    <div class="form-container">
        <h2>2: Dados do Imóvel</h2>
        <form id="form0203" novalidate>
            <div id="imoveis-container">
                <div class="imovel-block" data-index="0" id="imovel_0">
                    <div class="imovel-header accordion-header">
                        <div style="display: flex; align-items: center; gap: 10px;">
                            <span class="accordion-icon open">▼</span>
                            <h3 style="margin: 0; color: #0056b3;" class="imovel-title">Imóvel 1</h3>
                        </div>
                        <button type="button" class="btn-remove-imovel" style="display: none; background: #dc3545; color: white; border: none; border-radius: 4px; padding: 6px 12px; cursor: pointer; transition: background 0.2s;">✕ Remover</button>
                    </div>
                    <div class="imovel-content accordion-content open">
                    <!-- MENU DE ABAS -->
                    <div class="tabs-nav" style="display: flex; gap: 8px; margin-bottom: 25px; border-bottom: 2px solid #ddd; padding-bottom: 8px;">
                        <button type="button" class="tab-link active" data-tab="tab-identificacao_0" style="padding: 8px 16px; border: none; background: #0056b3; color: white; border-radius: 4px; cursor: pointer; font-weight: bold; transition: background 0.2s;">Identificação do Imóvel</button>
                        <button type="button" class="tab-link" data-tab="tab-ocupacao_0" style="padding: 8px 16px; border: none; background: #e9ecef; color: #333; border-radius: 4px; cursor: pointer; font-weight: bold; transition: background 0.2s;">Ocupação</button>
                        <button type="button" class="tab-link" data-tab="tab-restricoes_0" style="padding: 8px 16px; border: none; background: #e9ecef; color: #333; border-radius: 4px; cursor: pointer; font-weight: bold; transition: background 0.2s;">Restrições</button>
                    </div>
                    
                    <div class="tabs-container">
                        <!-- ABA 1: IDENTIFICAÇÃO DO IMÓVEL -->
                        <div id="tab-identificacao_0" class="tab-pane active" style="display: block;">
                            <div class="form-group inline">
                                <label for="campo-rip_0">RIP:</label>
                                <input type="text" id="campo-rip_0" name="imoveis[0][rip]" placeholder="Ex: 0101000001-00" value="9701.00012.500-0" autocomplete="off" class="rip-input" required>
                            </div>
                            <div class="form-group inline">
                                <label for="campo21_0">CEP:</label>
                                <input type="text" id="campo21_0" name="imoveis[0][cep]" placeholder="Ex: 00000-000" maxlength="9" value="01001-000" autocomplete="off" required>
                            </div>
                            <div class="form-group inline">
                                <label for="campo22_0">UF:</label>
                                <input type="text" name="imoveis[0][uf]" value="SP">
                            </div>
                            <div class="form-group inline">
                                <label for="campo23_0">Município:</label>
                                <input type="text" id="campo23_0" name="imoveis[0][municipio]" placeholder="Preenchido a partir do CEP" value="São Paulo" autocomplete="off" required>
                            </div>
                            <div class="form-group inline">
                                <label for="campo24_0">Endereço:</label>
                                <input type="text" id="campo24_0" name="imoveis[0][endereco]" placeholder="Logradouro, número, bairro" value="Praça da Sé, s/n" autocomplete="off" required>
                            </div>
                            <div class="form-group inline">
                                <label for="campo27_0">Área total (m²):</label>
                                <input type="text" id="campo27_0" name="imoveis[0][area_total]" placeholder="0,00" value="5000.00" required>
                            </div>
                            <div class="form-group inline">
                                <label for="campo28_0">Área da União (m²):</label>
                                <input type="text" id="campo28_0" name="imoveis[0][area_uniao]" placeholder="0,00" value="5000.00">
                            </div>
                            <div class="form-group inline">
                                <label>Há benfeitorias?</label>
                                <input type="text" name="imoveis[0][benfeitorias]" value="Sim" id="benfeitorias-sim_0">
                            </div>

                            <!-- 2.21 Tipologia territorial (Dropdown Corrigido) -->
                            <div class="form-group inline">
                                <label for="campo221_0">Tipologia territorial:</label>
                                <select id="campo221_0" name="imoveis[0][tipologia]" required>
                                    <option value="">Selecione...</option>
                                    <option value="Zona urbana consolidada">Zona urbana consolidada</option>
                                    <option value="Zona urbana dispersa">Zona urbana dispersa</option>
                                    <option value="Zona rural">Zona rural</option>
                                    <option value="Zona periurbana">Zona periurbana</option>
                                    <option value="Outros">Outros</option>
                                </select>
                            </div>
                            <div class="form-group editavel" id="bloco221_obs">
                                <label for="obs221_0">Observações complementares (Tipologia):</label>
                                <textarea id="obs221_0" name="imoveis[0][obs_tipologia]" placeholder="Observações sobre a tipologia territorial..."></textarea>
                            </div>

                            <!-- 2.23 Situação dominial (Dropdown Corrigido) -->
                            <div class="form-group inline">
                                <label for="campo223_0">Situação dominial/registral:</label>
                                <select id="campo223_0" name="imoveis[0][situacao_dominial]" required>
                                    <option value="">Selecione...</option>
                                    <option value="Regular">Regular</option>
                                    <option value="Irregular">Irregular</option>
                                    <option value="Pendente">Pendente</option>
                                    <option value="Desconhecida">Desconhecida</option>
                                    <option value="Outros">Outros</option>
                                </select>
                            </div>
                            <div class="form-group editavel" id="bloco223_obs">
                                <label for="obs223_0">Observações complementares (Dominial):</label>
                                <textarea id="obs223_0" name="imoveis[0][obs_dominial]" placeholder="Observações sobre a situação dominial/registral..."></textarea>
                            </div>
                        </div>

                        <!-- ABA 2: OCUPAÇÃO -->
                        <div id="tab-ocupacao_0" class="tab-pane" style="display: none;">
                            <!-- 3.1 Situação ocupacional (CORRIGIDO PARA CONDICIONAL) -->
                            <div class="form-group editavel">
                                <label for="campo31_0">Situação ocupacional:</label>
                                <select id="campo31_0" name="imoveis[0][situacao_ocupacional]" required>
                                    <option value="">Selecione...</option>
                                    <option value="Desocupado">Desocupado</option>
                                    <option value="Ocupado regularmente">Ocupado regularmente</option>
                                    <option value="Ocupado irregularmente">Ocupado irregularmente</option>
                                    <option value="Em disputa judicial">Em disputa judicial</option>
                                    <option value="Parcialmente ocupado">Parcialmente ocupado</option>
                                </select>
                            </div>
                            <div class="form-group editavel" id="bloco31_obs">
                                <label for="obs31_0">Observações complementares (Situação):</label>
                                <textarea id="obs31_0" name="imoveis[0][obs_situacao_ocupacional]" placeholder="Observações sobre a situação ocupacional..."></textarea>
                            </div>

                            <!-- 3.5 Incidência ambiental (CORRIGIDO PARA DROPDOWN CONDICIONAL) -->
                            <div class="form-group inline">
                                <label for="campo35_0">Incidência ambiental:</label>
                                <select id="campo35_0" name="imoveis[0][incidencia_ambiental]" required>
                                    <option value="">Selecione...</option>
                                    <option value="Nenhuma incidência relevante identificada">Nenhuma incidência relevante identificada</option>
                                    <option value="Área de Preservação Permanente (APP)">Área de Preservação Permanente (APP)</option>
                                    <option value="Unidade de Conservação">Unidade de Conservação</option>
                                    <option value="Terreno contaminado">Terreno contaminado</option>
                                    <option value="Outros">Outros</option>
                                </select>
                            </div>
                            <div class="form-group editavel" id="bloco35_obs">
                                <label for="obs35_0">Observações complementares (Ambiental):</label>
                                <textarea id="obs35_0" name="imoveis[0][obs_incidencia_ambiental]" placeholder="Observações sobre a incidência ambiental..."></textarea>
                            </div>

                            <!-- 3.6 Custos SPU -->
                            <div class="form-group editavel">
                                <label>Há custos de manutenção (SPU)?</label>
                                <div class="radio-group">
                                    <label><input type="radio" name="imoveis[0][custos_manutencao]" value="Sim"> Sim</label>
                                    <label><input type="radio" name="imoveis[0][custos_manutencao]" value="Não" checked> Não</label>
                                </div>
                            </div>
                        </div>

                        <!-- ABA 3: RESTRIÇÕES -->
                        <div id="tab-restricoes_0" class="tab-pane" style="display: none;">
                            <!-- 3.8 Risco invasão -->
                            <div class="form-group editavel">
                                <label>Risco de invasão/esbulho?</label>
                                <div class="radio-group">
                                    <label><input type="radio" name="imoveis[0][risco_invasao]" value="Sim"> Sim</label>
                                    <label><input type="radio" name="imoveis[0][risco_invasao]" value="Não" checked> Não</label>
                                </div>
                            </div>
                            <div class="form-group editavel" id="bloco38_0">
                                <label for="desc38_0">Descrever Risco Invasão:</label>
                                <textarea id="desc38_0" name="imoveis[0][desc_risco_invasao]"></textarea>
                            </div>
                            <!-- ... demais campos 3.9 a 3.13 já configurados anteriormente ... -->
                        </div>
                    </div>
                </div>
            </div>
            </div>
            
            <div class="button-group">
                <button type="submit" id="btnEnviar">✅ Salvar</button>
            </div>
        </form>
    </div>

    <script src="foco-02.js"></script>
    
    <script>
        // Lógica de Abas
        document.addEventListener('click', function(e) {
            if (e.target.classList.contains('tab-link')) {
                const tabsContainer = e.target.closest('.imovel-content');
                tabsContainer.querySelectorAll('.tab-link').forEach(btn => btn.classList.remove('active'));
                tabsContainer.querySelectorAll('.tab-pane').forEach(pane => pane.style.display = 'none');
                e.target.classList.add('active');
                const tabId = e.target.getAttribute('data-tab');
                tabsContainer.querySelector('#' + tabId).style.display = 'block';
            }
        });

        // FUNÇÕES DE VISIBILIDADE CONDICIONAL
        document.addEventListener('change', function(event) {
            const target = event.target;

            // 3.1 Situação ocupacional
            if (target.matches('select[name="imoveis[0][situacao_ocupacional]"]')) {
                document.getElementById('bloco31_obs').style.display = target.value !== "" ? 'block' : 'none';
            }

            // 3.5 Incidência ambiental
            if (target.matches('select[name="imoveis[0][incidencia_ambiental]"]')) {
                document.getElementById('bloco35_obs').style.display = target.value !== "" ? 'block' : 'none';
            }

            // 2.21 Tipologia territorial
            if (target.matches('select[name="imoveis[0][tipologia]"]')) {
                document.getElementById('bloco221_obs').style.display = target.value !== "" ? 'block' : 'none';
            }

            // 2.23 Situação dominial
            if (target.matches('select[name="imoveis[0][situacao_dominial]"]')) {
                document.getElementById('bloco223_obs').style.display = target.value !== "" ? 'block' : 'none';
            }

            // Radios (Riscos 3.8 a 3.13)
            if (target.type === 'radio') {
                const name = target.name;
                const value = target.value;
                if (name === "imoveis[0][risco_invasao]") {
                    document.getElementById('bloco38_0').style.display = value === 'Sim' ? 'block' : 'none';
                }
                // Repetir lógica para 3.9 a 3.13 conforme IDs existentes...
            }
        });
    </script>
</body>
</html>
