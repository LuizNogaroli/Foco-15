<!DOCTYPE html>
<html lang="pt-BR">
<head>

<body>
    <div class="form-container">

        <h2>3: Análise do Imóvel</h2>

        <form id="form0203" novalidate>

            <div id="imoveis-container">
                <div class="imovel-block" data-index="0" id="imovel_0">
                    <div class="imovel-header accordion-header">
                        <div style="display: flex; align-items: center; gap: 10px;">
                            <span class="accordion-icon open">▼</span>
                            <h3 style="margin: 0; color: #0056b3;" class="imovel-title">Imóvel 1</h3>
                        </div>
                        <button type="button" class="btn-remove-imovel" style="display: none; background: #dc3545; color: white; border: none; border-radius: 4px; padding: 6px 12px; cursor: pointer; transition: background 0.2s;">✕ Remover</button>
                    </div>

	     <div class="imovel-content accordion-content open">
                    

            <!-- 3.1 Situação ocupacional -->
            <div class="form-group editavel">
                <label for="campo31_0">Situação ocupacional:</label>
                <select id="campo31_0" name="imoveis[0][situacao_ocupacional]" required>
                    <option value="" selected>Selecione...</option>
                    <option value="Desocupado">Desocupado</option>
                    <option value="Ocupado regularmente">Ocupado regularmente</option>
                    <option value="Ocupado irregularmente">Ocupado irregularmente</option>
                    <option value="Em disputa judicial">Em disputa judicial</option>
                    <option value="Parcialmente ocupado">Parcialmente ocupado</option>
                </select>
                <!-- Obs Situação Ocupacional — abre quando qualquer opção válida é selecionada -->
                <div id="bloco-obs31_0" style="display: none; flex-direction: column; gap: 6px; margin-top: 8px;">
                    <label for="obs31_0">Observações complementares:</label>
                    <textarea id="obs31_0" name="imoveis[0][obs_situacao_ocupacional]" placeholder="Observações sobre a situação ocupacional..."></textarea>
                </div>
            </div>

            <!-- 3.2 Tipo de uso atual -->
            <div class="form-group inline">
                <label for="campo32_0">Tipo de uso imobiliário atual:</label>
                <input type="text" name="imoveis[0][tipo_uso_atual]" value="Comercial">
            </div>

            <!-- 3.3 Uso específico atual -->
            <div class="form-group inline">
                <label for="campo33_0">Tipo de uso específico atual:</label>
                <input type="text" name="imoveis[0][tipo_uso_especifico_atual]" value="Escritório/sede administrativa">
            </div>

            <!-- 3.4 Tempo de ocupação -->

                <label for="campo34_0">Tempo de ocupação:</label>

            </div>

            <!-- 3.5 Incidência ambiental -->
            <div class="form-group editavel">
                <label for="campo35_0">Incidência ambiental:</label>
                <select id="campo35_0" name="imoveis[0][incidencia_ambiental]" required>
                    <option value="" selected>Selecione...</option>
                    <option value="APP">APP (Área de Preservação Permanente): Área protegida por legislação ambiental específica, com restrições severas de uso e ocupação</option>
                    <option value="Unidade de Conservação">Unidade de Conservação: Inserida em UC federal, estadual ou municipal, sujeito a regime próprio de proteção</option>
                    <option value="Área de risco">Área de risco: Zona com instabilidade geotécnica, inundação recorrente ou outro risco físico relevante</option>
                    <option value="Área contaminada">Área contaminada: Presença de passivo ambiental identificado ou potencial</option>
                    <option value="Nenhuma incidência relevante">Nenhuma incidência relevante identificada: Não foram constatadas restrições ambientais significativas</option>
                    <option value="Outra">Outra situação específica (descrever nas observações)</option>

            <!-- 3.6 Custos SPU -->

                <div class="radio-group" id="group-custos_0">

                </div>

            <!-- 3.8 Risco invasão -->

                    </span>

                <div class="radio-group" id="group-risco-coletividade_0">
                    <label class="radio-option"><input type="radio" name="imoveis[0][risco_coletividade]" value="Sim"> Sim</label>
                    <label class="radio-option"><input type="radio" name="imoveis[0][risco_coletividade]" value="Não"> Não</label>
                    <label class="radio-option"><input type="radio" name="imoveis[0][risco_coletividade]" value="Não há como avaliar"> Não há como avaliar</label>
                </div>
                <!-- Desc Riscos Coletividade — abre SOMENTE quando "Sim" é selecionado -->
                <div id="bloco-desc39_0" style="display: none; flex-direction: column; gap: 6px; margin-top: 8px;">
                    <label for="desc39_0">Descrever Riscos Coletividade:</label>

                </div>

            <!-- 3.10 Ações judiciais -->

                <label>Ações judiciais ou de órgãos de controle:
                    <span class="hint-semaforo">
                        <span class="hint-icon" data-hint-tipo="verde" data-hint="Selecione as ações judiciais ou de controle externo que incidem sobre o imóvel." role="tooltip" tabindex="0" aria-label="Ajuda: Ações judiciais">?</span>
                    </span>
                </label>
                <div class="radio-group" id="group-acoes_0">
                    <label class="radio-option"><input type="radio" name="imoveis[0][acoes]" value="Sim"> Sim</label>
                    <label class="radio-option"><input type="radio" name="imoveis[0][acoes]" value="Não"> Não</label>
                    <label class="radio-option"><input type="radio" name="imoveis[0][acoes]" value="Não há como avaliar"> Não há como avaliar</label>
                </div>
                <!-- Obs Ações — abre SOMENTE quando "Sim" é selecionado -->
                <div id="bloco-obs310_0" style="display: none; flex-direction: column; gap: 6px; margin-top: 8px;">
                    <label for="obs310_0">Observações complementares (Ações judiciais ou de órgãos de controle):</label>
                    <textarea id="obs310_0" name="imoveis[0][obs_acoes]" placeholder="Descreva o impacto das ações sobre o uso/destinação do imóvel..."></textarea>
                </div>
            </div>

            <!-- 3.11 Imóvel tombado -->
            <div class="form-group editavel">
                <label>Imóvel tombado?
                    <span class="hint-semaforo">
                        <span class="hint-icon" data-hint-tipo="verde" data-hint="Indique se o imóvel é tombado pelo patrimônio histórico e/ou cultural." role="tooltip" tabindex="0" aria-label="Ajuda: Imóvel tombado">?</span>
                    </span>
                </label>
                <div class="radio-group" id="group-tombado_0">
                    <label class="radio-option"><input type="radio" name="imoveis[0][tombado]" value="Sim"> Sim</label>
                    <label class="radio-option"><input type="radio" name="imoveis[0][tombado]" value="Não"> Não</label>
                    <label class="radio-option"><input type="radio" name="imoveis[0][tombado]" value="Sem informação"> Sem informação</label>
                </div>
                <!-- Obs Tombado — abre SOMENTE quando "Sim" é selecionado -->
                <div id="bloco-obs311_0" style="display: none; flex-direction: column; gap: 6px; margin-top: 8px;">
                    <label for="obs311_0">Observações complementares (Tombamento):</label>
                    <textarea id="obs311_0" name="imoveis[0][obs_tombado]" placeholder="Descreva o impacto do tombamento sobre o uso/destinação..."></textarea>
                </div>
            </div>

            <!-- 3.12 Conflitos fundiários -->
            <div class="form-group editavel">
                <label>Há conflitos fundiários/sociais?
                    <span class="hint-semaforo">
                        <span class="hint-icon" data-hint-tipo="verde" data-hint="Indique se há conflitos fundiários ou sociais identificados no imóvel ou entorno." role="tooltip" tabindex="0" aria-label="Ajuda: Conflitos fundiários">?</span>
                    </span>
                </label>
                <div class="radio-group" id="group-conflitos_0">
                    <label class="radio-option"><input type="radio" name="imoveis[0][conflitos_fundiarios]" value="Sim"> Sim</label>
                    <label class="radio-option"><input type="radio" name="imoveis[0][conflitos_fundiarios]" value="Não"> Não</label>
                    <label class="radio-option"><input type="radio" name="imoveis[0][conflitos_fundiarios]" value="Sem informação"> Sem informação</label>
                </div>
                <!-- Obs Conflitos — abre SOMENTE quando "Sim" é selecionado -->
                <div id="bloco-obs312_0" style="display: none; flex-direction: column; gap: 6px; margin-top: 8px;">
                    <label for="obs312_0">Observações complementares (Conflitos):</label>
                    <textarea id="obs312_0" name="imoveis[0][obs_conflitos]" placeholder="Descreva os conflitos fundiários/sociais identificados..."></textarea>
                </div>
            </div>

            <!-- 3.13 Termo gestão praias -->
            <div class="form-group editavel">
                <label>Termo Gestão Praias/PGI?
                    <span class="hint-semaforo">
                        <span class="hint-icon" data-hint-tipo="verde" data-hint="Indique se o imóvel está inserido em área com Termo de Gestão de Praias ou Plano de Gestão Integrada vigente." role="tooltip" tabindex="0" aria-label="Ajuda: Termo de Gestão de Praias">?</span>
                    </span>
                </label>
                <div class="radio-group" id="group-gestao-praias_0">
                    <label class="radio-option"><input type="radio" name="imoveis[0][gestao_praias]" value="Sim"> Sim</label>
                    <label class="radio-option"><input type="radio" name="imoveis[0][gestao_praias]" value="Não"> Não</label>
                    <label class="radio-option"><input type="radio" name="imoveis[0][gestao_praias]" value="Sem informação"> Sem informação</label>
                </div>
                <!-- Obs Gestão Praias — abre SOMENTE quando "Sim" é selecionado -->

                    <label for="obs313_0">Observações complementares (Gestão Praias):</label>

                </div>

            <!-- Restrições — Observações gerais / Arquivos complementares / Retificação do cadastro -->
            <div class="form-group editavel">
                <label for="obs224-rest_0">Restrições:<br>(Observações gerais / Arquivos complementares / Retificação do cadastro)</label>
                <textarea id="obs224-rest_0" name="imoveis[0][obs_geral_rest]" placeholder="Descreva a observação, faça upload do(s) arquivos ou solicite uma retificação no cadastro..."></textarea>
                <div class="dynamic-list-wrapper" style="flex: 1; display: flex; flex-direction: column; gap: 8px;">

                        </div>

                </div>

                        </div>
                        <!-- Fim Aba 3 -->

                    </div> <!-- Fim Tabs Container -->
                </div>
            </div>
            </div> <!-- Fim imoveis-container -->


            <div class="form-group" style="text-align: center; margin-top: 30px;">
                <button type="button" class="btn-add" id="btnAdicionarImovel" style="font-size: 1.1em; padding: 12px 24px;">
                    ＋ Adicionar Novo Imóvel/RIP
                </button>
            </div>

            <!-- Botões -->
            <div class="button-group">
                <button type="button" class="btn-secondary" id="btnLimpar">🗑️ Limpar</button>
                <button type="button" id="btnImprimir" onclick="window.print()">🖨️ Imprimir / Salvar PDF</button>
                <button type="submit" id="btnEnviar">✅ Salvar</button>

    <script src="formulario.js"></script>
    <script src="hints.js"></script>
    <script src="foco-02.js"></script>

    <script>
        // ================================================================
        // ALTERNÂNCIA DE ABAS
        // ================================================================
        document.addEventListener('click', function (e) {
            if (e.target.classList.contains('tab-link')) {
                const tabsContainer = e.target.closest('.imovel-content');
                tabsContainer.querySelectorAll('.tab-link').forEach(btn => {
                    btn.classList.remove('active');
                    btn.style.background = '#e9ecef';
                    btn.style.color = '#333';
                });
                tabsContainer.querySelectorAll('.tab-pane').forEach(pane => pane.style.display = 'none');
                e.target.classList.add('active');
                e.target.style.background = '#0056b3';
                e.target.style.color = 'white';
                const tabId = e.target.getAttribute('data-tab');
                tabsContainer.querySelector('#' + tabId).style.display = 'block';
            }
        });

        // ================================================================
        // UTILITÁRIO: mostrar/ocultar bloco pelo ID
        // ================================================================
        function setBlocoVisivel(blocoId, visivel) {
            const bloco = document.getElementById(blocoId);
            if (!bloco) return;
            bloco.style.display = visivel ? 'flex' : 'none';
        }

        // ================================================================
        // SELECT TOGGLE
        // Abre o bloco quando qualquer opção válida (não vazia) é escolhida.
        // ================================================================
        function initSelectToggle(selectEl, blocoId) {
            if (!selectEl) return;
            const atualizar = () => setBlocoVisivel(blocoId, selectEl.value !== '');
            atualizar();
            selectEl.addEventListener('change', atualizar);
        }

        // ================================================================
        // RADIO TOGGLE — modo "somente Sim"
        // Abre o bloco SOMENTE quando o radio com value="Sim" está marcado.
        // ================================================================
        function initRadioToggleSim(radioName, blocoId, scope) {
            scope = scope || document;
            const radios = scope.querySelectorAll('input[type="radio"][name="' + radioName + '"]');
            if (!radios.length) return;

            const atualizar = () => {
                const simMarcado = Array.from(radios).some(r => r.value === 'Sim' && r.checked);
                setBlocoVisivel(blocoId, simMarcado);
            };
            atualizar();
            radios.forEach(r => r.addEventListener('change', atualizar));
        }

        // ================================================================
        // LISTA DINÂMICA DE DOCUMENTOS
        // Vincula o botão "＋ Adicionar" à lista de itens correspondente.
        // ================================================================
        function initDynamicList(btnId, listId) {
            const btn  = document.getElementById(btnId);
            const list = document.getElementById(listId);
            if (!btn || !list) return;

            // Clona o botão para remover qualquer listener anterior (seguro ao reinicializar)
            const newBtn = btn.cloneNode(true);
            btn.parentNode.replaceChild(newBtn, btn);

            newBtn.addEventListener('click', () => {
                // Descobre o name a partir do primeiro input da lista
                const firstInput = list.querySelector('.imagem-input');
                const inputName  = firstInput ? firstInput.name : '';

                const item = document.createElement('div');
                item.className = 'imagem-item';
                item.style.cssText = 'display:flex; gap:8px; align-items:center;';
                item.innerHTML = `
                    <input type="text" name="${inputName}" placeholder="Faça upload dos documentos adicionais..."
                           autocomplete="off" class="imagem-input" style="flex: 1;">
                    <button type="button" class="btn-remove-imagem" title="Remover">✕</button>
                `;
                list.appendChild(item);
                item.querySelector('.btn-remove-imagem')
                    .addEventListener('click', () => item.remove());
            });

            // Ativa o botão de remover nos itens já existentes no HTML
            list.querySelectorAll('.btn-remove-imagem').forEach(removeBtn => {
                removeBtn.addEventListener('click', () => removeBtn.closest('.imagem-item').remove());
            });
        }

        // ================================================================
        // INICIALIZAÇÃO DE UM BLOCO DE IMÓVEL (por índice)
        // ================================================================
        function initImovelToggle(idx) {
            const scope = document.getElementById('imovel_' + idx) || document;

            // --- ABA 1: Identificação ---
            initSelectToggle(scope.querySelector('#campo221_' + idx), 'bloco-obs221_' + idx);
            initSelectToggle(scope.querySelector('#campo223_' + idx), 'bloco-obs223_' + idx);
            initDynamicList('btnAdicionarImagemIdent_' + idx, 'imagens-list-ident_' + idx);

            // --- ABA 2: Ocupação ---
            initSelectToggle(scope.querySelector('#campo31_' + idx), 'bloco-obs31_' + idx);
            initSelectToggle(scope.querySelector('#campo35_' + idx), 'bloco-obs35_' + idx);
            initRadioToggleSim('imoveis[' + idx + '][custos_manutencao]', 'bloco-obs37_' + idx, scope);
            initDynamicList('btnAdicionarImagemOcup_' + idx, 'imagens-list-ocup_' + idx);

            // --- ABA 3: Restrições ---
            initRadioToggleSim('imoveis[' + idx + '][risco_invasao]',       'bloco-desc38_'  + idx, scope);
            initRadioToggleSim('imoveis[' + idx + '][risco_coletividade]',  'bloco-desc39_'  + idx, scope);
            initRadioToggleSim('imoveis[' + idx + '][acoes]',               'bloco-obs310_'  + idx, scope);
            initRadioToggleSim('imoveis[' + idx + '][tombado]',             'bloco-obs311_'  + idx, scope);
            initRadioToggleSim('imoveis[' + idx + '][conflitos_fundiarios]','bloco-obs312_'  + idx, scope);
            initRadioToggleSim('imoveis[' + idx + '][gestao_praias]',       'bloco-obs313_'  + idx, scope);
            initDynamicList('btnAdicionarImagemRest_' + idx, 'imagens-list-rest_' + idx);
        }

        // ================================================================
        // EXECUTA AO CARREGAR A PÁGINA
        // ================================================================
        document.addEventListener('DOMContentLoaded', function () {
            initImovelToggle(0);
        });

        // ================================================================
        // HOOK GLOBAL para foco-02.js ao criar novos imóveis dinamicamente.
        // Após criar o novo bloco HTML, chame: window.initImovelToggle(novoIdx)
        // ================================================================
        window.initImovelToggle = initImovelToggle;
    </script>

</body>
</html>
