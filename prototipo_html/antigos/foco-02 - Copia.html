<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FOCO-02 — Identificação, Ocupação e Restrições</title>
    <link rel="stylesheet" href="styles-forms.css">
    <link rel="stylesheet" href="hints.css">
    <style>
        .aviso {
            font-size: 12.5px;
            font-weight: 700;
            color: darkred;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 10px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="form-container">

        <h2>2: Dados do Imóvel</h2>

        <h4 class="aviso">Alterações nos dados devem ser feitas no SPUnet, módulo Cadastro</h4>

        <form id="form0203" novalidate>

            <!-- ========== PESQUISA DE RIP ========== -->
            <div class="form-group" style="text-align: center; margin-top: 30px;">

                <!-- Campo + botão pesquisar -->
                <div id="searchRIPContainer" style="display: flex; justify-content: center; align-items: center; gap: 10px; flex-wrap: wrap;">
                    <input
                        type="text"
                        id="inputRIP"
                        placeholder="Digite o nº RIP do imóvel"
                        maxlength="18"
                        autocomplete="off"
                        style="font-size: 1em; padding: 10px 14px; border: 1px solid #ccc; border-radius: 6px; width: 260px; outline: none;"
                    />
                    <button
                        type="button"
                        class="btn-add"
                        id="btnPesquisarRIP"
                        style="font-size: 1em; padding: 10px 20px;"
                        onclick="pesquisarRIP()"
                    >
                        🔍 Pesquisar RIP
                    </button>
                </div>

                <!-- Resultado da pesquisa -->
                <div id="resultadoRIP" style="display: none; margin-top: 20px; padding: 16px; border: 1px solid #d0d0d0; border-radius: 8px; background: #f9f9f9; max-width: 500px; margin-left: auto; margin-right: auto;">
                    <div id="dadosImovel" style="text-align: left; font-size: 0.95em; color: #333;"></div>
                    <div style="display: flex; justify-content: center; gap: 12px; margin-top: 16px;">
                        <button
                            type="button"
                            id="btnInserirRIP"
                            style="font-size: 0.95em; padding: 8px 18px; background-color: #2e7d32; color: white; border: none; border-radius: 6px; cursor: pointer;"
                            onclick="inserirRIP()"
                        >
                            ✅ Inserir RIP
                        </button>
                        <button
                            type="button"
                            id="btnCancelarRIP"
                            style="font-size: 0.95em; padding: 8px 18px; background-color: #c62828; color: white; border: none; border-radius: 6px; cursor: pointer;"
                            onclick="cancelarRIP()"
                        >
                            ❌ Cancelar
                        </button>
                    </div>
                </div>

            </div>
            <!-- ========== FIM PESQUISA DE RIP ========== -->


            <div id="imoveis-container">
                <div class="imovel-block" data-index="0" id="imovel_0">
                    <div class="imovel-header accordion-header">
                        <div style="display: flex; align-items: center; gap: 10px;">
                            <span class="accordion-icon open">▼</span>
                            <h3 style="margin: 0; color: #0056b3;" class="imovel-title">Imóvel 1</h3>
                        </div>
                        <button type="button" class="btn-remove-imovel" style="display: none; background: #dc3545; color: white; border: none; border-radius: 4px; padding: 6px 12px; cursor: pointer; transition: background 0.2s;">✕ Remover</button>
                    </div>
                    <div class="imovel-content accordion-content open">

                        <!-- ==================== IDENTIFICAÇÃO DO IMÓVEL ==================== -->
                        <h4 style="margin: 0 0 16px 0; color: #0056b3; border-bottom: 2px solid #ddd; padding-bottom: 8px;">Identificação do Imóvel</h4>

                        <!-- 2.6 RIP -->
                        <div class="form-group inline">
                            <label for="campo-rip_0">RIP:</label>
                            <input type="text" id="campo-rip_0" name="imoveis[0][rip]" placeholder="Ex: 0101000001-00" value="9701.00012.500-0" autocomplete="off" class="rip-input" required>
                        </div>

                        <!-- 2.16 Conceituação do Imóvel -->
                        <div class="form-group inline">
                            <label for="campo216_0">Conceituação do Imóvel:</label>
                            <input type="text" id="campo216_0" name="imoveis[0][conceituacao]" value="Terreno/Acrescido de marinha">
                        </div>

                        <!-- 2.21 Tipologia territorial -->
                        <div class="form-group inline">
                            <label for="campo221_0">Natureza do Imóvel:</label>
                            <input type="text" id="campo221_0" name="imoveis[0][tipologia]" value="Urbano">
                        </div>

                        <!-- 2.17 Categoria -->
                        <div class="form-group inline">
                            <label for="campo217_0">Tipo de Imóvel:</label>
                            <input type="text" id="campo217_0" name="imoveis[0][categoria]" value="Gleba/Terreno/Lote com edificação">
                        </div>

                        <!-- 2.1 CEP -->
                        <div class="form-group inline">
                            <label for="campo21_0">CEP:</label>
                            <input type="text" id="campo21_0" name="imoveis[0][cep]" placeholder="Ex: 00000-000" maxlength="9" value="01001-000" autocomplete="off" required>
                        </div>

                        <!-- 2.2 UF -->
                        <div class="form-group inline">
                            <label for="campo22_0">UF:</label>
                            <input type="text" id="campo22_0" name="imoveis[0][uf]" value="SP">
                        </div>

                        <!-- 2.3 Município -->
                        <div class="form-group inline">
                            <label for="campo23_0">Município:</label>
                            <input type="text" id="campo23_0" name="imoveis[0][municipio]" placeholder="Preenchido a partir do CEP" value="São Paulo" autocomplete="off" required>
                        </div>

                        <!-- 2.4 Endereço -->
                        <div class="form-group inline">
                            <label for="campo24_0">Endereço:</label>
                            <input type="text" id="campo24_0" name="imoveis[0][endereco]" placeholder="Logradouro, número, bairro" value="Praça da Sé, s/n" autocomplete="off" required>
                        </div>

                        <!-- 2.7 Área total -->
                        <div class="form-group inline">
                            <label for="campo27_0">Área total (m²):</label>
                            <input type="text" id="campo27_0" name="imoveis[0][area_total]" placeholder="0,00" min="0" step="0.01" value="5000.00" required>
                        </div>

                        <!-- 2.8 Área da União -->
                        <div class="form-group inline">
                            <label for="campo28_0">Área da União (m²):</label>
                            <input type="text" id="campo28_0" name="imoveis[0][area_uniao]" placeholder="0,00" min="0" step="0.01" value="5000.00">
                        </div>

                        <!-- 2.9 + 2.10 + 2.11 — Grupo benfeitorias -->
                        <div class="form-group inline" id="grupo-benfeitorias_0">

                            <!-- 2.9 Há benfeitorias? -->
                            <label>Há benfeitorias?</label>
                            <input type="text" name="imoveis[0][benfeitorias]" value="Sim">

                            <!-- 2.10 Área construída total -->
                            <label for="campo210_0">Área construída total (m²):</label>
                            <input type="text" id="campo210_0" name="imoveis[0][area_construida_total]" placeholder="0,00" min="0" step="0.01" value="1200.00">

                            <!-- 2.11 Área construída proposta -->
                            <div id="bloco211_0" style="width: 100%; margin-top: 10px;">
                                <label for="campo211_0">Área construída prop. destinação (m²):</label>
                                <input type="number" id="campo211_0" name="imoveis[0][area_construida_proposta]" placeholder="0,00" min="0" step="0.01" value="1200.00">
                            </div>

                        </div>
                        <!-- Fim grupo benfeitorias -->

                        <!-- 2.13 Valor do Imóvel -->
                        <div class="form-group inline">
                            <label for="campo213_0">Valor avaliado (R$):</label>
                            <input type="text" id="campo213_0" name="imoveis[0][valor_imovel]" placeholder="R$ 0,00" value="R$ 15.000.000,00" autocomplete="off">
                        </div>

                        <!-- 2.14 Data da avaliação -->
                        <div class="form-group inline">
                            <label for="campo214_0">Data da avaliação:</label>
                            <input type="text" id="campo214_0" name="imoveis[0][data_avaliacao]" value="10/01/2024">
                        </div>

                        <!-- 2.15 Instrumento de avaliação -->
                        <div class="form-group inline">
                            <label for="campo215_0">Instrumento de avaliação:</label>
                            <input type="text" id="campo215_0" name="imoveis[0][instrumento_avaliacao]" placeholder="Ex: Laudo de avaliação..." value="Laudo Técnico SPU" autocomplete="off">
                        </div>

                        <!-- 2.23 Situação dominial/registral -->
                        <div class="form-group inline">
                            <label for="campo223_0">Situação da Incorporação:</label>
                            <input type="text" id="campo223_0" name="imoveis[0][situacao_dominial]" value="Em processo de incorporação">
                        </div>

                        <!-- 2.19 LPM/LMEO -->
                        <div class="form-group inline" id="bloco219_0">
                            <label>LPM/1831 ou LMEO homologadas?</label>
                            <input type="text" name="imoveis[0][lpm_lmeo]" value="Sim">
                        </div>

                        <!-- 2.22 Incorporação -->
                        <div class="form-group inline">
                            <label>Processo de incorporação?</label>
                            <input type="text" name="imoveis[0][incorporacao]" value="Sim">
                        </div>

                        <!-- 2.22b Número do Processo -->
                        <div class="form-group inline">
                            <label>Número do Processo</label>
                            <input type="text" name="imoveis[0][num_processo]" value="123456789">
                        </div>

                        <!-- 2.24 Matrículas -->
                        <div class="form-group inline">
                            <label for="campo224_0">Matrículas:</label>
                            <input type="text" id="campo224_0" name="imoveis[0][matriculas]" value="123.456 - 1º CRI SP">
                        </div>

                        <!-- Observações / Upload -->
                        <div class="form-group editavel">
                            <label for="obs224_0">Observações:</label>
                            <textarea id="obs224_0" name="imoveis[0][obs_geral_ident]" placeholder=""></textarea>
                            <div class="dynamic-list-wrapper" style="flex: 1; display: flex; flex-direction: column; gap: 8px;">
                                <button type="button" class="btn-add" id="btnAdicionarImagemIdent_0" style="align-self: flex-start;">＋ Adicionar link/documento</button>
                                <div id="imagens-list-ident_0"></div>
                            </div>
                        </div>

                    </div> <!-- Fim accordion-content -->
                </div>
            </div> <!-- Fim imoveis-container -->

            <div class="form-group" style="text-align: center; margin-top: 30px;">
                <button type="button" class="btn-add" id="btnAdicionarImovel" style="font-size: 1.1em; padding: 12px 24px;">
                    ＋ Adicionar Novo Imóvel/RIP
                </button>
            </div>

            <!-- Botões -->
            <div class="button-group">
                <button type="button" class="btn-secondary" id="btnLimpar">🗑️ Limpar</button>
                <button type="button" id="btnImprimir" onclick="window.print()">🖨️ Imprimir / Salvar PDF</button>
                <button type="submit" id="btnEnviar">✅ Salvar</button>
            </div>

        </form>
    </div>

    <script src="formulario.js"></script>
    <script src="hints.js"></script>
    <script src="foco-02.js"></script>

    <script>

        // ================================================================
        // PESQUISA DE RIP
        // ================================================================
        function pesquisarRIP() {
            const rip = document.getElementById('inputRIP').value.trim();

            if (!rip) {
                alert('Por favor, informe o nº RIP do imóvel.');
                return;
            }

            // Simulação de busca — substitua pela sua lógica real (fetch/API/etc.)
            const dadosMock = {
                rip: rip,
                descricao: 'Terreno/Acrescido de marinha',
                logradouro: 'Praça da Sé, s/n',
                municipio: 'São Paulo / SP',
                situacao: 'Aforado'
            };

            exibirResultadoRIP(dadosMock);
        }

        function exibirResultadoRIP(dados) {
            const container = document.getElementById('resultadoRIP');
            const dadosDiv  = document.getElementById('dadosImovel');

            dadosDiv.innerHTML = `
                <p style="margin: 4px 0;"><strong>RIP:</strong> ${dados.rip}</p>
                <p style="margin: 4px 0;"><strong>Descrição:</strong> ${dados.descricao}</p>
                <p style="margin: 4px 0;"><strong>Logradouro:</strong> ${dados.logradouro}</p>
                <p style="margin: 4px 0;"><strong>Município:</strong> ${dados.municipio}</p>
                <p style="margin: 4px 0;"><strong>Situação:</strong> ${dados.situacao}</p>
            `;

            container.style.display = 'block';
        }

        function inserirRIP() {
            const rip = document.getElementById('inputRIP').value.trim();
            // Implemente aqui a lógica real de inserção do RIP no sistema
            alert(`RIP ${rip} inserido com sucesso!`);
            cancelarRIP();
        }

        function cancelarRIP() {
            document.getElementById('inputRIP').value = '';
            document.getElementById('resultadoRIP').style.display = 'none';
        }

        // ================================================================
        // UTILITÁRIO: mostrar/ocultar bloco pelo ID
        // ================================================================
        function setBlocoVisivel(blocoId, visivel) {
            const bloco = document.getElementById(blocoId);
            if (!bloco) return;
            bloco.style.display = visivel ? 'flex' : 'none';
        }

        // ================================================================
        // SELECT TOGGLE
        // ================================================================
        function initSelectToggle(selectEl, blocoId) {
            if (!selectEl) return;
            const atualizar = () => setBlocoVisivel(blocoId, selectEl.value !== '');
            atualizar();
            selectEl.addEventListener('change', atualizar);
        }

        // ================================================================
        // RADIO TOGGLE — modo "somente Sim"
        // ================================================================
        function initRadioToggleSim(radioName, blocoId, scope) {
            scope = scope || document;
            const radios = scope.querySelectorAll('input[type="radio"][name="' + radioName + '"]');
            if (!radios.length) return;

            const atualizar = () => {
                const bloco = document.getElementById(blocoId);
                if (!bloco) return;
                const simMarcado = Array.from(radios).some(r => r.value === 'Sim' && r.checked);
                bloco.style.display = simMarcado ? 'block' : 'none';
            };
            atualizar();
            radios.forEach(r => r.addEventListener('change', atualizar));
        }

        // ================================================================
        // LISTA DINÂMICA DE DOCUMENTOS
        // ================================================================
        function initDynamicList(btnId, listId) {
            const btn  = document.getElementById(btnId);
            const list = document.getElementById(listId);
            if (!btn || !list) return;

            list.innerHTML = '';

            const newBtn = btn.cloneNode(true);
            btn.parentNode.replaceChild(newBtn, btn);

            newBtn.addEventListener('click', () => {
                const nameMap = {
                    'ident': 'imagens_ident',
                    'ocup' : 'imagens_ocup',
                    'rest' : 'imagens_rest'
                };
                const matchSuffix = listId.match(/imagens-list-(\w+)_(\d+)/);
                let inputName = '';
                if (matchSuffix) {
                    const section = matchSuffix[1];
                    const idx     = matchSuffix[2];
                    const field   = nameMap[section] || ('imagens_' + section);
                    inputName = `imoveis[${idx}][${field}][]`;
                }

                const item = document.createElement('div');
                item.className = 'imagem-item';
                item.style.cssText = 'display:flex; gap:8px; align-items:center; margin-top:6px;';
                item.innerHTML = `
                    <input type="text" name="${inputName}" placeholder="Link/Documento Anexado"
                           autocomplete="off" class="imagem-input" style="flex: 1;">
                    <button type="button" class="btn-remove-imagem" title="Remover">✕</button>
                `;
                list.appendChild(item);
                item.querySelector('input').focus();
                item.querySelector('.btn-remove-imagem')
                    .addEventListener('click', () => item.remove());
            });
        }

        // ================================================================
        // INICIALIZAÇÃO DE UM BLOCO DE IMÓVEL (por índice)
        // ================================================================
        function initImovelToggle(idx) {
            const scope = document.getElementById('imovel_' + idx) || document;

            // --- Identificação ---
            initSelectToggle(scope.querySelector('#campo221_' + idx), 'bloco-obs221_' + idx);
            initSelectToggle(scope.querySelector('#campo223_' + idx), 'bloco-obs223_' + idx);
            initDynamicList('btnAdicionarImagemIdent_' + idx, 'imagens-list-ident_' + idx);

            // Benfeitorias → exibe Área construída total apenas quando "Sim"
            initRadioToggleSim('imoveis[' + idx + '][benfeitorias]', 'bloco210_' + idx, scope);

            // --- Ocupação ---
            initSelectToggle(scope.querySelector('#campo31_' + idx),  'bloco-obs31_'  + idx);
            initSelectToggle(scope.querySelector('#campo35_' + idx),  'bloco-obs35_'  + idx);
            initRadioToggleSim('imoveis[' + idx + '][custos_manutencao]', 'bloco-obs37_' + idx, scope);
            initDynamicList('btnAdicionarImagemOcup_' + idx, 'imagens-list-ocup_' + idx);

            // --- Restrições ---
            initRadioToggleSim('imoveis[' + idx + '][risco_invasao]',        'bloco-desc38_'  + idx, scope);
            initRadioToggleSim('imoveis[' + idx + '][risco_coletividade]',   'bloco-desc39_'  + idx, scope);
            initRadioToggleSim('imoveis[' + idx + '][acoes]',                'bloco-obs310_'  + idx, scope);
            initRadioToggleSim('imoveis[' + idx + '][tombado]',              'bloco-obs311_'  + idx, scope);
            initRadioToggleSim('imoveis[' + idx + '][conflitos_fundiarios]', 'bloco-obs312_'  + idx, scope);
            initRadioToggleSim('imoveis[' + idx + '][gestao_praias]',        'bloco-obs313_'  + idx, scope);
            initDynamicList('btnAdicionarImagemRest_' + idx, 'imagens-list-rest_' + idx);
        }

        // ================================================================
        // EXECUTA AO CARREGAR A PÁGINA
        // ================================================================
        document.addEventListener('DOMContentLoaded', function () {
            initImovelToggle(0);
        });

        // ================================================================
        // HOOK GLOBAL para foco-02.js ao criar novos imóveis dinamicamente.
        // ================================================================
        window.initImovelToggle = initImovelToggle;

    </script>

</body>
</html>
