<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Imóvel - SPU</title>

  <!-- Leaflet CSS -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  />

  <style>
    :root {
      --carousel-gap: 16px;
      --carousel-height-desktop: 250px;
      --carousel-height-mobile: 460px;
      --spu-blue: #1e3a5f;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: #ffffff;
      color: #333333;
    }

    .page {
      display: flex;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }

    /* =========================
       LADO ESQUERDO
    ========================== */

    .left {
      width: 50%;
      display: flex;
      flex-direction: column;
      gap: 20px;
      padding: 20px;
      overflow-y: auto;
      background: #ffffff;
      scrollbar-gutter: stable;
    }

    #map {
      width: 100%;
      height: 50vh;
      min-height: 480px;
      border: 1px solid #cccccc;
      border-radius: 6px;
      flex: 0 0 auto;
    }

    /* =========================
       CARROSSEL
    ========================== */

    .carousel-container {
      width: 100%;
      height: var(--carousel-height-desktop);
      min-height: var(--carousel-height-desktop);
      flex: 0 0 var(--carousel-height-desktop);
      overflow: hidden;
      position: relative;
      border-radius: 12px;
      background: #f2f2f2;
    }

    .carousel-track {
      display: flex;
      gap: var(--carousel-gap);
      height: 100%;
      transition: transform 0.4s ease-in-out;
    }

    .carousel-item {
      flex: 0 0 calc((100% - var(--carousel-gap)) / 2);
      height: 100%;
      min-height: 100%;
      border-radius: 12px;
      overflow: hidden;
      background: #f2f2f2;
      cursor: pointer;
    }

    .carousel-item img {
      width: 100%;
      height: 100%;
      min-height: 100%;
      object-fit: cover;
      display: block;
    }

    .carousel-button {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 42px;
      height: 90px;
      border: none;
      background: rgba(0, 0, 0, 0.28);
      color: #ffffff;
      font-size: 38px;
      cursor: pointer;
      border-radius: 6px;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
    }

    .carousel-button:hover {
      background: rgba(0, 0, 0, 0.48);
    }

    .carousel-button.prev {
      left: 10px;
    }

    .carousel-button.next {
      right: 10px;
    }

    /* =========================
       LADO DIREITO
    ========================== */

    .right {
      width: 50%;
      padding: 20px;
      overflow-y: auto;
      background: #ffffff;
      scrollbar-gutter: stable;
    }

.accordion {
  width: 100%;
  margin-right: 0px;
}


    .accordion-item {
      margin-bottom: 10px;
      border: none;
    }

    .accordion-header {
      width: 100%;
      background: var(--spu-blue);
      color: #ffffff;
      padding: 7px 16px;
      font-size: 0.97em;
      font-weight: 600;
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
      user-select: none;
      border-radius: 6px;
      transition: background 0.2s;
    }

    .accordion-header:hover {
      background: #2d5282;
    }

    .accordion-header .arrow {
      font-size: 0.85em;
      transition: transform 0.25s ease;
    }

    .accordion-item.active .accordion-header .arrow {
      transform: rotate(180deg);
    }

    .accordion-content {
      display: none;
      padding: 0;
      border: 1px solid #dddddd;
      border-top: none;
      background: #ffffff;
      border-radius: 0 0 4px 4px;
      overflow: hidden;
    }

    .accordion-item.active .accordion-content {
      display: block;
    }

    .accordion-iframe {
      width: 100%;
      height: 72vh;
      min-height: 520px;
      border: none;
      display: block;
      background: #ffffff;
    }

    .info-box {
      width: 100%;
      margin-top: 20px;
      padding: 12px 15px;
      background: #f3f7f9;
      border-left: 4px solid var(--spu-blue);
      font-size: 14px;
      color: #444444;
      border-radius: 4px;
      line-height: 1.5;
    }

    /* =========================
       RESPONSIVO
    ========================== */

    @media (max-width: 768px) {
      .page {
        flex-direction: column;
        height: auto;
        overflow: auto;
      }

      .left,
      .right {
        width: 100%;
      }

      #map {
        height: 420px;
        min-height: 320px;
      }

      .carousel-container {
        height: var(--carousel-height-mobile);
        min-height: var(--carousel-height-mobile);
        flex: 0 0 var(--carousel-height-mobile);
      }

      .carousel-item {
        flex: 0 0 100%;
        height: 100%;
        min-height: 100%;
      }

      .accordion-iframe {
        height: 75vh;
        min-height: 480px;
      }
    }
  </style>
</head>

<body>
  <div class="page">
    <!-- LADO ESQUERDO -->
    <section class="left">
      <!-- MAPA -->
      <div id="map"></div>

      <!-- CARROSSEL DE FOTOS -->
      <div class="carousel-container">
        <button class="carousel-button prev" type="button" onclick="moveCarousel(-1)">
          ‹
        </button>

        <div class="carousel-track" id="carouselTrack">
          <div class="carousel-item">
            <img
              src="https://images.unsplash.com/photo-1560518883-ce09059eeffa?auto=format&fit=crop&w=1200&q=80"
              alt="Foto do imóvel 1"
            />
          </div>

          <div class="carousel-item">
            <img
              src="https://images.unsplash.com/photo-1486406146926-c627a92ad1ab?auto=format&fit=crop&w=1200&q=80"
              alt="Foto do imóvel 2"
            />
          </div>

          <div class="carousel-item">
            <img
              src="https://images.unsplash.com/photo-1494526585095-c41746248156?auto=format&fit=crop&w=1200&q=80"
              alt="Foto do imóvel 3"
            />
          </div>

          <div class="carousel-item">
            <img
              src="https://images.unsplash.com/photo-1600585154340-be6161a56a0c?auto=format&fit=crop&w=1200&q=80"
              alt="Foto do imóvel 4"
            />
          </div>

          <div class="carousel-item">
            <img
              src="https://images.unsplash.com/photo-1605146769289-440113cc3d00?auto=format&fit=crop&w=1200&q=80"
              alt="Foto do imóvel 5"
            />
          </div>

          <div class="carousel-item">
            <img
              src="https://images.unsplash.com/photo-1582407947304-fd86f028f716?auto=format&fit=crop&w=1200&q=80"
              alt="Foto do imóvel 6"
            />
          </div>
        </div>

        <button class="carousel-button next" type="button" onclick="moveCarousel(1)">
          ›
        </button>
      </div>
    </section>

    <!-- LADO DIREITO -->
    <section class="right">
      <!-- SELETOR DE PERFIL / ETAPA -->
      <div style="margin-bottom: 20px; padding: 15px; background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 8px;">
        <label for="perfilSeletor" style="display: block; font-size: 12px; font-weight: 700; color: #1e3a5f; text-transform: uppercase; margin-bottom: 8px; letter-spacing: 0.5px;">
          Visualizar como:
        </label>
        <select id="perfilSeletor" style="width: 100%; padding: 10px; border: 2px solid #1e3a5f; border-radius: 6px; font-size: 14px; font-weight: 600; color: #1e3a5f; background: #fff; cursor: pointer;">
          <option value="todos">-- Ver todas as etapas --</option>
          <option value="uf-tecnica">UF - Equipe Técnica</option>
          <option value="uf-chefia">UF - Chefia</option>
          <option value="uf-coord">UF - Coordenação</option>
          <option value="uf-super">UF - Superintendência</option>
          <option value="uc-tecnica">UC - Equipe Técnica</option>
          <option value="uc-coord">UC - Coordenação Geral</option>
          <option value="uc-diretoria">UC - Diretoria</option>
          <option value="cde">CDE - Comitê de Destinação</option>
        </select>
        <p style="margin-top: 8px; font-size: 11px; color: #64748b;">
          * O seletor acima simula a visão de cada nível hierárquico no processo.
        </p>
      </div>

      <div class="accordion">
        <!-- ABA 01 - DADOS DO REQUERIMENTO -->
        <div class="accordion-item" data-fase="sempre">
          <div class="accordion-header" onclick="toggleAccordion(this)">
            <span>📋 Dados do Requerimento</span>
            <span class="arrow">▼</span>
          </div>

          <div class="accordion-content">
            <iframe
              class="accordion-iframe"
              src="./foco-01-resumo.html"
              title="Dados do Requerimento"
            ></iframe>
          </div>
        </div>

        <!-- ABA 02 - DADOS DO IMÓVEL -->
        <div class="accordion-item" data-fase="sempre">
          <div class="accordion-header" onclick="toggleAccordion(this)">
            <span>📋 Dados do Imóvel</span>
            <span class="arrow">▼</span>
          </div>

          <div class="accordion-content">
            <iframe
              class="accordion-iframe"
              src="./foco-02-resumo.html"
              title="Dados do Imóvel"
            ></iframe>
          </div>
        </div>

        <!-- ABA 03 - ANÁLISE DO IMÓVEL -->
        <div class="accordion-item" data-fase="sempre">
          <div class="accordion-header" onclick="toggleAccordion(this)">
            <span>📋 Análise do Imóvel</span>
            <span class="arrow">▼</span>
          </div>

          <div class="accordion-content">
            <iframe
              class="accordion-iframe"
              src="./foco-04-resumo.html"
              title="Análise do Imóvel"
            ></iframe>
          </div>
        </div>

        <!-- ABA 04 - ANÁLISE DO DESTINATÁRIO -->
        <div class="accordion-item" data-fase="sempre">
          <div class="accordion-header" onclick="toggleAccordion(this)">
            <span>📋 Análise do Destinatário</span>
            <span class="arrow">▼</span>
          </div>

          <div class="accordion-content">
            <iframe
              class="accordion-iframe"
              src="./foco-05-resumo.html"
              title="Análise do Destinatário"
            ></iframe>
          </div>
        </div>

        <!-- ABA 05 - PROPOSTA DE DESTINAÇÃO -->
        <div class="accordion-item" data-fase="sempre">
          <div class="accordion-header" onclick="toggleAccordion(this)">
            <span>📋 Proposta de Destinação</span>
            <span class="arrow">▼</span>
          </div>

          <div class="accordion-content">
            <iframe
              class="accordion-iframe"
              src="./foco-06-resumo.html"
              title="Proposta de Destinação"
            ></iframe>
          </div>
        </div>

        <!-- ABA 06 - MANIFESTAÇÃO SPU/UF -->
        <div class="accordion-item" data-fase="uf-tecnica uf-chefia uf-coord uf-super">
          <div class="accordion-header" onclick="toggleAccordion(this)">
            <span>📋 Deliberação - SPU/UF</span>
            <span class="arrow">▼</span>
          </div>

          <div class="accordion-content">
            <iframe
              class="accordion-iframe"
              src="./foco-07.html"
              title="Manifestação SPU/UF"
            ></iframe>
          </div>
        </div>

        <!-- ABA 07 - MANIFESTAÇÃO SPU/UC -->
        <div class="accordion-item" data-fase="uc-tecnica uc-coord uc-diretoria">
          <div class="accordion-header" onclick="toggleAccordion(this)">
            <span>📋 Deliberação - SPU/UC</span>
            <span class="arrow">▼</span>
          </div>

          <div class="accordion-content">
            <iframe
              class="accordion-iframe"
              src="./foco-08.html"
              title="Manifestação SPU/UC"
            ></iframe>
          </div>
        </div>

        <!-- ABA 08 - DELIBERAÇÃO CDE -->
        <div class="accordion-item" data-fase="cde">
          <div class="accordion-header" onclick="toggleAccordion(this)">
            <span>📋 Deliberação CDE</span>
            <span class="arrow">▼</span>
          </div>

          <div class="accordion-content">
            <iframe
              class="accordion-iframe"
              src="./foco-10.html"
              title="Deliberação CDE"
            ></iframe>
          </div>
        </div>
      </div>

    </section>
  </div>

  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <script>
    /* =========================
       MAPA
    ========================== */

    const map = L.map("map").setView([-15.7998, -47.8645], 15);

    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      attribution: "&copy; OpenStreetMap"
    }).addTo(map);

    const polygon = L.polygon(
      [
        [-15.7989, -47.8660],
        [-15.7987, -47.8634],
        [-15.8010, -47.8631],
        [-15.8013, -47.8657]
      ],
      {
        color: "#176985",
        fillColor: "#176985",
        fillOpacity: 0.25,
        weight: 3
      }
    ).addTo(map);

    polygon.bindPopup("Polígono do imóvel");

    const marker = L.marker([-15.7998, -47.8645]).addTo(map);

    marker
      .bindPopup("<strong>Imóvel selecionado</strong><br>Área de interesse")
      .openPopup();

    map.fitBounds(polygon.getBounds());

    setTimeout(function () {
      map.invalidateSize();
    }, 300);

/* =========================
   ABAS SANFONA
   Clique abre e também fecha a aba.
========================== */

function toggleAccordion(element) {
  const item = element.closest(".accordion-item");
  const isActive = item.classList.contains("active");

  document.querySelectorAll(".accordion-item").forEach(function (accordionItem) {
    accordionItem.classList.remove("active");
  });

  if (!isActive) {
    item.classList.add("active");
  }
}


    /* =========================
       CARROSSEL
    ========================== */

    let carouselPos = 0;

    function getItemsVisible() {
      return window.innerWidth <= 768 ? 1 : 2;
    }

    function getCarouselGap() {
      const styles = getComputedStyle(document.documentElement);
      return parseInt(styles.getPropertyValue("--carousel-gap"), 10) || 16;
    }

    function moveCarousel(direction) {
      const track = document.getElementById("carouselTrack");
      const items = document.querySelectorAll(".carousel-item");

      if (!items.length) {
        return;
      }

      const itemsVisible = getItemsVisible();
      const maxPos = Math.max(items.length - itemsVisible, 0);

      carouselPos += direction;

      if (carouselPos < 0) {
        carouselPos = 0;
      }

      if (carouselPos > maxPos) {
        carouselPos = maxPos;
      }

      const gap = getCarouselGap();
      const itemWidth = items[0].offsetWidth + gap;

      track.style.transform = "translateX(-" + carouselPos * itemWidth + "px)";
    }

    window.addEventListener("resize", function () {
      const track = document.getElementById("carouselTrack");
      const items = document.querySelectorAll(".carousel-item");

      if (!items.length) {
        return;
      }

      const itemsVisible = getItemsVisible();
      const maxPos = Math.max(items.length - itemsVisible, 0);

      if (carouselPos > maxPos) {
        carouselPos = maxPos;
      }

      const gap = getCarouselGap();
      const itemWidth = items[0].offsetWidth + gap;

      track.style.transform = "translateX(-" + carouselPos * itemWidth + "px)";

      setTimeout(function () {
        map.invalidateSize();
      }, 300);
    });

    /* =========================
       AMPLIAR FOTO
    ========================== */

    document.querySelectorAll(".carousel-item img").forEach(function (img) {
      img.addEventListener("click", function () {
        const overlay = document.createElement("div");

        overlay.style.position = "fixed";
        overlay.style.inset = "0";
        overlay.style.background = "rgba(0, 0, 0, 0.82)";
        overlay.style.display = "flex";
        overlay.style.alignItems = "center";
        overlay.style.justifyContent = "center";
        overlay.style.zIndex = "9999";
        overlay.style.cursor = "pointer";
        overlay.style.padding = "20px";

        const enlarged = document.createElement("img");

        enlarged.src = img.src;
        enlarged.alt = img.alt;
        enlarged.style.maxWidth = "90vw";
        enlarged.style.maxHeight = "90vh";
        enlarged.style.objectFit = "contain";
        enlarged.style.boxShadow = "0 0 30px rgba(0, 0, 0, 0.5)";
        enlarged.style.borderRadius = "8px";

        overlay.appendChild(enlarged);

        overlay.addEventListener("click", function () {
          overlay.remove();
        });

        document.body.appendChild(overlay);
      });
    });

    /* =========================
       LÓGICA DO SELETOR DE PERFIL
    ========================== */
    document.getElementById('perfilSeletor').addEventListener('change', function(e) {
      const perfil = e.target.value;
      const items = document.querySelectorAll('.accordion-item');

      items.forEach(item => {
        const fases = item.getAttribute('data-fase');
        
        // Se for "todos" ou se a fase do item for "sempre", mostra
        if (perfil === 'todos' || fases === 'sempre') {
          item.style.display = 'block';
        } else {
          // Verifica se o perfil selecionado está na lista de fases do item
          if (fases && fases.includes(perfil)) {
            item.style.display = 'block';
          } else {
            item.style.display = 'none';
          }
        }
      });
    });
  </script>
</body>
</html>
