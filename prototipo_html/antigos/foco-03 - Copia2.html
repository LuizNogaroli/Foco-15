<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FOCO-03 — Análise do(s) Imóvel(eis)</title>
    <link rel="stylesheet" href="styles-forms.css">
    <link rel="stylesheet" href="hints.css">
</head>
<body>
    <div class="form-container">

        <h2>3: Análise do(s) Imóvel(eis)</h2>

        <form id="form0203" novalidate>

            <div id="imoveis-container">
                <div class="imovel-block" data-index="0" id="imovel_0">
                    <div class="imovel-header accordion-header">
                        <div style="display: flex; align-items: center; gap: 10px;">
                            <span class="accordion-icon open">▼</span>
                            <h3 style="margin: 0; color: #0056b3;" class="imovel-title">Imóvel 1</h3>
                        </div>
                        <button type="button" class="btn-remove-imovel" style="display: none; background: #dc3545; color: white; border: none; border-radius: 4px; padding: 6px 12px; cursor: pointer; transition: background 0.2s;">✕ Remover</button>
                    </div>
                    <div class="imovel-content accordion-content open">

                        <!-- ==================== OCUPAÇÃO ==================== -->
                        <h4 style="margin: 0px 0 16px 0; color: #0056b3; border-bottom: 2px solid #ddd; padding-bottom: 8px;">Ocupação</h4>

                        <!-- 3.1 Situação ocupacional -->
                        <div class="form-group editavel">
                            <label for="campo31_0">Situação ocupacional:</label>
                            <select id="campo31_0" name="imoveis[0][situacao_ocupacional]" required>
                                <option value="" selected>Selecione...</option>
                                <option value="Desocupado">Desocupado</option>
                                <option value="Ocupado regularmente">Ocupado regularmente</option>
                                <option value="Ocupado irregularmente">Ocupado irregularmente</option>
                                <option value="Em disputa judicial">Em disputa judicial</option>
                                <option value="Parcialmente ocupado">Parcialmente ocupado</option>
                            </select>
                            <div id="bloco-obs31_0" style="display: none; flex-direction: column; gap: 6px; margin-top: 8px;">
                                <label for="obs31_0">Observações complementares:</label>
                                <textarea id="obs31_0" name="imoveis[0][obs_situacao_ocupacional]" placeholder="Observações sobre a situação ocupacional..."></textarea>
                            </div>
                        </div>

                        <!-- 3.2 Tipo de uso atual -->
                        <div class="form-group editavel">
                            <label for="campo32_0">Tipo de uso imobiliário atual:</label>
			    <select id="campo32_0" name="imoveis[0][tipo_uso_atual]" required>
		                    <option value="" disabled selected>Selecione...</option>
		                    <option value="Residencial">Residencial</option>
		                    <option value="Comercial">Comercial</option>
		                    <option value="Industrial">Industrial</option>
		                    <option value="Institucional">Institucional</option>
		                    <option value="Infraestrutura">Infraestrutura</option>
		                    <option value="Uso misto">Uso misto</option>
		                    <option value="Sem uso definido">Sem uso definido</option>
                            </select>
                        </div>

                        <!-- 3.3 Uso específico atual -->
                        <div class="form-group editavel">
                            <label for="campo33_0">Tipo de uso específico atual:</label>
                            <!--input type="text" id="campo33_0" name="imoveis[0][tipo_uso_especifico_atual]" value="Escritório/sede administrativa"-->
		                <select id="campo33_0" name="imoveis[0][tipo_uso_especifico_atual]">
                		    <option value="" selected>Selecione...</option>
		                    <option value="Moradia unifamiliar">Moradia unifamiliar</option>
		                    <option value="Moradia multifamiliar">Moradia multifamiliar</option>
		                    <option value="Habitação de interesse social">Habitação de interesse social</option>
		                    <option value="Escritório/sede administrativa">Escritório/sede administrativa</option>
		                    <option value="Escola/instituição de ensino">Escola/instituição de ensino</option>
		                    <option value="Unidade de saúde">Unidade de saúde</option>
		                    <option value="Equipamento de segurança pública">Equipamento de segurança pública</option>
		                    <option value="Equipamento de defesa nacional">Equipamento de defesa nacional</option>
		                    <option value="Área de lazer/recreação">Área de lazer/recreação</option>
		                    <option value="Armazenagem/logística">Armazenagem/logística</option>
                		    <option value="Outro">Outro</option>
		                </select>
                        </div>

                        <!-- 3.4 Tempo de ocupação -->
                        <div class="form-group editavel">
                            <label for="campo34_0">Tempo de ocupação:</label>
                            <input type="text" id="campo34_0" name="imoveis[0][tempo_ocupacao]" value="01" placeholder="Ex: 03/2010 ou 2010" autocomplete="off">
                        </div>

                        <!-- 3.5 Incidência ambiental -->
                        <div class="form-group editavel">
                            <label for="campo35_0">Incidência ambiental:</label>
                            <select id="campo35_0" name="imoveis[0][incidencia_ambiental]" required>
                                <option value="" selected>Selecione...</option>
                                <option value="APP">APP (Área de Preservação Permanente): Área protegida por legislação ambiental específica, com restrições severas de uso e ocupação</option>
                                <option value="Unidade de Conservação">Unidade de Conservação: Inserida em UC federal, estadual ou municipal, sujeito a regime próprio de proteção</option>
                                <option value="Área de risco">Área de risco: Zona com instabilidade geotécnica, inundação recorrente ou outro risco físico relevante</option>
                                <option value="Área contaminada">Área contaminada: Presença de passivo ambiental identificado ou potencial</option>
                                <option value="Nenhuma incidência relevante">Nenhuma incidência relevante identificada: Não foram constatadas restrições ambientais significativas</option>
                                <option value="Outra">Outra situação específica (descrever nas observações)</option>
                            </select>
                            <div id="bloco-obs35_0" style="display: none; flex-direction: column; gap: 6px; margin-top: 8px;">
                                <label for="obs35_0">Observações complementares (Ambiental):</label>
                                <textarea id="obs35_0" name="imoveis[0][obs_incidencia_ambiental]" placeholder="Observações sobre a incidência ambiental..."></textarea>
                            </div>
                        </div>

                        <!-- 3.6 Custos SPU -->
                        <div class="form-group editavel">
                            <label>Há custos de manutenção (SPU)?</label>
                            <div class="radio-group" id="group-custos_0">
                                <label class="radio-option"><input type="radio" name="imoveis[0][custos_manutencao]" value="Sim" id="custos-sim_0"> Sim</label>
                                <label class="radio-option"><input type="radio" name="imoveis[0][custos_manutencao]" value="Não" id="custos-nao_0"> Não</label>
                            </div>
                            <div id="bloco-obs37_0" style="display: none; flex-direction: column; gap: 6px; margin-top: 8px;">
                                <label for="campo37_0">Estimativa de custos anuais (R$):</label>
                                <input type="text" id="campo37_0" name="imoveis[0][estimativa_custos]" value="R$ 15.000,00" placeholder="R$ 0,00" autocomplete="off">
                            </div>
                        </div>


                        <!-- ==================== RESTRIÇÕES ==================== -->
                        <h4 style="margin: 24px 0 16px 0; color: #0056b3; border-bottom: 2px solid #ddd; padding-bottom: 8px;">Restrições</h4>

                        <!-- NOVAS PERGUNTAS DE RESTRIÇÕES (Sim/Não/Não há como avaliar) -->

                        <!-- Faixa de fronteira -->
                        <div class="form-group editavel">
                            <label>O imóvel está localizado em faixa de fronteira?
                                <span class="hint-semaforo">
                                    <span class="hint-icon" data-hint-tipo="verde" data-hint="Faixa de até 150 km de largura ao longo das fronteiras terrestres, considerada indispensável à segurança nacional (Lei nº 6.634/1979)." role="tooltip" tabindex="0" aria-label="Ajuda: Faixa de fronteira">?</span>
                                </span>
                            </label>
                            <div class="radio-group" id="group-faixa-fronteira_0">
                                <label class="radio-option"><input type="radio" name="imoveis[0][faixa_fronteira]" value="Sim"> Sim</label>
                                <label class="radio-option"><input type="radio" name="imoveis[0][faixa_fronteira]" value="Não"> Não</label>
                                <label class="radio-option"><input type="radio" name="imoveis[0][faixa_fronteira]" value="Não há como avaliar"> Não há como avaliar</label>
                            </div>
                            <div id="bloco-desc-faixa-fronteira_0" style="display: none; flex-direction: column; gap: 6px; margin-top: 8px;">
                                <label for="desc-faixa-fronteira_0">Descrição:</label>
                                <textarea id="desc-faixa-fronteira_0" name="imoveis[0][desc_faixa_fronteira]" placeholder="Descreva informações sobre a localização em faixa de fronteira..."></textarea>
                            </div>
                        </div>

                        <!-- Faixa de segurança -->
                        <div class="form-group editavel">
                            <label>O imóvel está localizado em faixa de segurança?
                                <span class="hint-semaforo">
                                    <span class="hint-icon" data-hint-tipo="verde" data-hint="Faixas de segurança definidas por legislação específica para proteção de infraestruturas, instalações estratégicas ou áreas sensíveis." role="tooltip" tabindex="0" aria-label="Ajuda: Faixa de segurança">?</span>
                                </span>
                            </label>
                            <div class="radio-group" id="group-faixa-seguranca_0">
                                <label class="radio-option"><input type="radio" name="imoveis[0][faixa_seguranca]" value="Sim"> Sim</label>
                                <label class="radio-option"><input type="radio" name="imoveis[0][faixa_seguranca]" value="Não"> Não</label>
                                <label class="radio-option"><input type="radio" name="imoveis[0][faixa_seguranca]" value="Não há como avaliar"> Não há como avaliar</label>
                            </div>
                            <div id="bloco-desc-faixa-seguranca_0" style="display: none; flex-direction: column; gap: 6px; margin-top: 8px;">
                                <label for="desc-faixa-seguranca_0">Descrição:</label>
                                <textarea id="desc-faixa-seguranca_0" name="imoveis[0][desc_faixa_seguranca]" placeholder="Descreva informações sobre a localização em faixa de segurança..."></textarea>
                            </div>
                        </div>

                        <!-- Faixa de domínio Ferrovia/Rodovia -->
                        <div class="form-group editavel">
                            <label>O imóvel está localizado em faixa de domínio Ferrovia/Rodovia?
                                <span class="hint-semaforo">
                                    <span class="hint-icon" data-hint-tipo="verde" data-hint="Área de domínio público ao longo de rodovias e ferrovias, sujeita a restrições de uso e ocupação conforme legislação vigente." role="tooltip" tabindex="0" aria-label="Ajuda: Faixa de domínio Ferrovia/Rodovia">?</span>
                                </span>
                            </label>
                            <div class="radio-group" id="group-faixa-dominio_0">
                                <label class="radio-option"><input type="radio" name="imoveis[0][faixa_dominio]" value="Sim"> Sim</label>
                                <label class="radio-option"><input type="radio" name="imoveis[0][faixa_dominio]" value="Não"> Não</label>
                                <label class="radio-option"><input type="radio" name="imoveis[0][faixa_dominio]" value="Não há como avaliar"> Não há como avaliar</label>
                            </div>
                            <div id="bloco-desc-faixa-dominio_0" style="display: none; flex-direction: column; gap: 6px; margin-top: 8px;">
                                <label for="desc-faixa-dominio_0">Descrição:</label>
                                <textarea id="desc-faixa-dominio_0" name="imoveis[0][desc_faixa_dominio]" placeholder="Descreva informações sobre a localização em faixa de domínio de ferrovia ou rodovia..."></textarea>
                            </div>
                        </div>

                        <!-- Faixa de 100m costa marítima -->
                        <div class="form-group editavel">
                            <label>O imóvel está localizado em faixa de 100 (cem) metros ao longo da costa marítima?
                                <span class="hint-semaforo">
                                    <span class="hint-icon" data-hint-tipo="verde" data-hint="Faixa de 100 metros ao longo da costa marítima, reservada conforme o Decreto-Lei nº 9.760/1946 e legislação correlata." role="tooltip" tabindex="0" aria-label="Ajuda: Faixa de 100m costa marítima">?</span>
                                </span>
                            </label>
                            <div class="radio-group" id="group-faixa-costa_0">
                                <label class="radio-option"><input type="radio" name="imoveis[0][faixa_costa]" value="Sim"> Sim</label>
                                <label class="radio-option"><input type="radio" name="imoveis[0][faixa_costa]" value="Não"> Não</label>
                                <label class="radio-option"><input type="radio" name="imoveis[0][faixa_costa]" value="Não há como avaliar"> Não há como avaliar</label>
                            </div>
                            <div id="bloco-desc-faixa-costa_0" style="display: none; flex-direction: column; gap: 6px; margin-top: 8px;">
                                <label for="desc-faixa-costa_0">Descrição:</label>
                                <textarea id="desc-faixa-costa_0" name="imoveis[0][desc_faixa_costa]" placeholder="Descreva informações sobre a localização na faixa de 100m da costa marítima..."></textarea>
                            </div>
                        </div>

                        <!-- Circunferência 1.320m instalações militares -->
                        <div class="form-group editavel">
                            <label>O imóvel está localizado ao longo de uma circunferência de 1.320 (mil trezentos e vinte) metros de raio em torno das fortificações e estabelecimentos militares?
                                <span class="hint-semaforo">
                                    <span class="hint-icon" data-hint-tipo="verde" data-hint="Área de restrição no entorno de instalações militares e fortificações, conforme legislação de segurança nacional vigente." role="tooltip" tabindex="0" aria-label="Ajuda: Circunferência 1.320m instalações militares">?</span>
                                </span>
                            </label>
                            <div class="radio-group" id="group-circ-militar_0">
                                <label class="radio-option"><input type="radio" name="imoveis[0][circ_militar]" value="Sim"> Sim</label>
                                <label class="radio-option"><input type="radio" name="imoveis[0][circ_militar]" value="Não"> Não</label>
                                <label class="radio-option"><input type="radio" name="imoveis[0][circ_militar]" value="Não há como avaliar"> Não há como avaliar</label>
                            </div>
                            <div id="bloco-desc-circ-militar_0" style="display: none; flex-direction: column; gap: 6px; margin-top: 8px;">
                                <label for="desc-circ-militar_0">Descrição:</label>
                                <textarea id="desc-circ-militar_0" name="imoveis[0][desc_circ_militar]" placeholder="Descreva informações sobre a localização na circunferência de 1.320m em torno de instalações militares..."></textarea>
                            </div>
                        </div>

                        <!-- Terra indígena -->
                        <div class="form-group editavel">
                            <label>O imóvel está localizado em terra indígena?
                                <span class="hint-semaforo">
                                    <span class="hint-icon" data-hint-tipo="verde" data-hint="Terras tradicionalmente ocupadas por povos indígenas, demarcadas ou em processo de demarcação, conforme art. 231 da Constituição Federal." role="tooltip" tabindex="0" aria-label="Ajuda: Terra indígena">?</span>
                                </span>
                            </label>
                            <div class="radio-group" id="group-terra-indigena_0">
                                <label class="radio-option"><input type="radio" name="imoveis[0][terra_indigena]" value="Sim"> Sim</label>
                                <label class="radio-option"><input type="radio" name="imoveis[0][terra_indigena]" value="Não"> Não</label>
                                <label class="radio-option"><input type="radio" name="imoveis[0][terra_indigena]" value="Não há como avaliar"> Não há como avaliar</label>
                            </div>
                            <div id="bloco-desc-terra-indigena_0" style="display: none; flex-direction: column; gap: 6px; margin-top: 8px;">
                                <label for="desc-terra-indigena_0">Descrição:</label>
                                <textarea id="desc-terra-indigena_0" name="imoveis[0][desc_terra_indigena]" placeholder="Descreva informações sobre a localização em terra indígena..."></textarea>
                            </div>
                        </div>

                        <!-- Território quilombola ou comunidade tradicional -->
                        <div class="form-group editavel">
                            <label>O imóvel está localizado em território quilombola ou área de comunidade tradicional?
                                <span class="hint-semaforo">
                                    <span class="hint-icon" data-hint-tipo="verde" data-hint="Territórios de comunidades remanescentes de quilombos ou outras comunidades tradicionais, conforme art. 68 do ADCT e legislação específica." role="tooltip" tabindex="0" aria-label="Ajuda: Território quilombola ou comunidade tradicional">?</span>
                                </span>
                            </label>
                            <div class="radio-group" id="group-quilombola_0">
                                <label class="radio-option"><input type="radio" name="imoveis[0][quilombola]" value="Sim"> Sim</label>
                                <label class="radio-option"><input type="radio" name="imoveis[0][quilombola]" value="Não"> Não</label>
                                <label class="radio-option"><input type="radio" name="imoveis[0][quilombola]" value="Não há como avaliar"> Não há como avaliar</label>
                            </div>
                            <div id="bloco-desc-quilombola_0" style="display: none; flex-direction: column; gap: 6px; margin-top: 8px;">
                                <label for="desc-quilombola_0">Descrição:</label>
                                <textarea id="desc-quilombola_0" name="imoveis[0][desc_quilombola]" placeholder="Descreva informações sobre a localização em território quilombola ou comunidade tradicional..."></textarea>
                            </div>
                        </div>

                        <!-- Poligonal de Porto Organizado -->
                        <div class="form-group editavel">
                            <label>O imóvel está localizado em poligonal de Porto Organizado?
                                <span class="hint-semaforo">
                                    <span class="hint-icon" data-hint-tipo="verde" data-hint="Área delimitada pelo poder público dentro da qual se exercem as atividades portuárias, conforme Lei nº 12.815/2013 (Lei dos Portos)." role="tooltip" tabindex="0" aria-label="Ajuda: Poligonal de Porto Organizado">?</span>
                                </span>
                            </label>
                            <div class="radio-group" id="group-porto_0">
                                <label class="radio-option"><input type="radio" name="imoveis[0][porto_organizado]" value="Sim"> Sim</label>
                                <label class="radio-option"><input type="radio" name="imoveis[0][porto_organizado]" value="Não"> Não</label>
                                <label class="radio-option"><input type="radio" name="imoveis[0][porto_organizado]" value="Não há como avaliar"> Não há como avaliar</label>
                            </div>
                            <div id="bloco-desc-porto_0" style="display: none; flex-direction: column; gap: 6px; margin-top: 8px;">
                                <label for="desc-porto_0">Descrição:</label>
                                <textarea id="desc-porto_0" name="imoveis[0][desc_porto_organizado]" placeholder="Descreva informações sobre a localização em poligonal de Porto Organizado..."></textarea>
                            </div>
                        </div>

                        <!-- Área de regularização fundiária -->
                        <div class="form-group editavel">
                            <label>O imóvel está localizado em área de regularização fundiária?
                                <span class="hint-semaforo">
                                    <span class="hint-icon" data-hint-tipo="verde" data-hint="Área sujeita a processo de regularização fundiária urbana (REURB) ou rural, conforme Lei nº 13.465/2017 ou legislação específica." role="tooltip" tabindex="0" aria-label="Ajuda: Área de regularização fundiária">?</span>
                                </span>
                            </label>
                            <div class="radio-group" id="group-reg-fundiaria_0">
                                <label class="radio-option"><input type="radio" name="imoveis[0][reg_fundiaria]" value="Sim"> Sim</label>
                                <label class="radio-option"><input type="radio" name="imoveis[0][reg_fundiaria]" value="Não"> Não</label>
                                <label class="radio-option"><input type="radio" name="imoveis[0][reg_fundiaria]" value="Não há como avaliar"> Não há como avaliar</label>
                            </div>
                            <div id="bloco-desc-reg-fundiaria_0" style="display: none; flex-direction: column; gap: 6px; margin-top: 8px;">
                                <label for="desc-reg-fundiaria_0">Descrição:</label>
                                <textarea id="desc-reg-fundiaria_0" name="imoveis[0][desc_reg_fundiaria]" placeholder="Descreva informações sobre a localização em área de regularização fundiária..."></textarea>
                            </div>
                        </div>

                        <!-- PDISP -->
                        <div class="form-group editavel">
                            <label>O imóvel possui PDISP?
                                <span class="hint-semaforo">
                                    <span class="hint-icon" data-hint-tipo="verde" data-hint="Plano de Disposição de Imóveis do Sistema de Patrimônio da União — instrumento de planejamento que define a destinação prevista para o imóvel." role="tooltip" tabindex="0" aria-label="Ajuda: PDISP">?</span>
                                </span>
                            </label>
                            <div class="radio-group" id="group-pdisp_0">
                                <label class="radio-option"><input type="radio" name="imoveis[0][pdisp]" value="Sim"> Sim</label>
                                <label class="radio-option"><input type="radio" name="imoveis[0][pdisp]" value="Não"> Não</label>
                                <label class="radio-option"><input type="radio" name="imoveis[0][pdisp]" value="Não há como avaliar"> Não há como avaliar</label>
                            </div>
                            <div id="bloco-desc-pdisp_0" style="display: none; flex-direction: column; gap: 6px; margin-top: 8px;">
                                <label for="desc-pdisp_0">Descrição:</label>
                                <textarea id="desc-pdisp_0" name="imoveis[0][desc_pdisp]" placeholder="Descreva informações sobre o PDISP do imóvel..."></textarea>
                            </div>
                        </div>

                        <!-- Área operacional da RFFSA -->
                        <div class="form-group editavel">
                            <label>O imóvel está em área operacional da RFFSA?
                                <span class="hint-semaforo">
                                    <span class="hint-icon" data-hint-tipo="verde" data-hint="Áreas pertencentes ao acervo da extinta Rede Ferroviária Federal S.A. (RFFSA), cujos bens foram transferidos à União e se encontram sob gestão de diferentes órgãos." role="tooltip" tabindex="0" aria-label="Ajuda: Área operacional da RFFSA">?</span>
                                </span>
                            </label>
                            <div class="radio-group" id="group-rffsa_0">
                                <label class="radio-option"><input type="radio" name="imoveis[0][rffsa]" value="Sim"> Sim</label>
                                <label class="radio-option"><input type="radio" name="imoveis[0][rffsa]" value="Não"> Não</label>
                                <label class="radio-option"><input type="radio" name="imoveis[0][rffsa]" value="Não há como avaliar"> Não há como avaliar</label>
                            </div>
                            <div id="bloco-desc-rffsa_0" style="display: none; flex-direction: column; gap: 6px; margin-top: 8px;">
                                <label for="desc-rffsa_0">Descrição:</label>
                                <textarea id="desc-rffsa_0" name="imoveis[0][desc_rffsa]" placeholder="Descreva informações sobre a localização em área operacional da RFFSA..."></textarea>
                            </div>
                        </div>

                        <!-- FIM DAS NOVAS PERGUNTAS -->

                        <!-- 3.8 Risco invasão -->
                        <div class="form-group editavel">
                            <label>Risco de invasão/esbulho?</label>
                            <div class="radio-group" id="group-invasao_0">
                                <label class="radio-option"><input type="radio" name="imoveis[0][risco_invasao]" value="Sim"> Sim</label>
                                <label class="radio-option"><input type="radio" name="imoveis[0][risco_invasao]" value="Não"> Não</label>
                                <label class="radio-option"><input type="radio" name="imoveis[0][risco_invasao]" value="Não há como avaliar"> Não há como avaliar</label>
                            </div>

    <script src="formulario.js"></script>
    <script src="hints.js"></script>
    <script src="foco-02.js"></script>

    <script>
        // ================================================================
        // UTILITÁRIO: mostrar/ocultar bloco pelo ID
        // ================================================================
        function setBlocoVisivel(blocoId, visivel) {
            const bloco = document.getElementById(blocoId);
            if (!bloco) return;
            bloco.style.display = visivel ? 'flex' : 'none';
        }

        // ================================================================
        // SELECT TOGGLE
        // ================================================================
        function initSelectToggle(selectEl, blocoId) {
            if (!selectEl) return;
            const atualizar = () => setBlocoVisivel(blocoId, selectEl.value !== '');
            atualizar();
            selectEl.addEventListener('change', atualizar);
        }

        // ================================================================
        // RADIO TOGGLE — modo "somente Sim"
        // ================================================================
        function initRadioToggleSim(radioName, blocoId, scope) {
            scope = scope || document;
            const radios = scope.querySelectorAll('input[type="radio"][name="' + radioName + '"]');
            if (!radios.length) return;

            const atualizar = () => {
                const simMarcado = Array.from(radios).some(r => r.value === 'Sim' && r.checked);
                setBlocoVisivel(blocoId, simMarcado);
            };
            atualizar();
            radios.forEach(r => r.addEventListener('change', atualizar));
        }

        // ================================================================
        // LISTA DINÂMICA DE DOCUMENTOS
        // ================================================================
        function initDynamicList(btnId, listId) {
            const btn  = document.getElementById(btnId);
            const list = document.getElementById(listId);
            if (!btn || !list) return;

            list.innerHTML = '';

            const newBtn = btn.cloneNode(true);
            btn.parentNode.replaceChild(newBtn, btn);

            newBtn.addEventListener('click', () => {
                const nameMap = {
                    'ident': 'imagens_ident',
                    'ocup' : 'imagens_ocup',
                    'rest' : 'imagens_rest'
                };
                const matchSuffix = listId.match(/imagens-list-(\w+)_(\d+)/);
                let inputName = '';
                if (matchSuffix) {
                    const section = matchSuffix[1];
                    const idx     = matchSuffix[2];
                    const field   = nameMap[section] || ('imagens_' + section);
                    inputName = `imoveis[${idx}][${field}][]`;
                }

                const item = document.createElement('div');
                item.className = 'imagem-item';
                item.style.cssText = 'display:flex; gap:8px; align-items:center; margin-top:6px;';
                item.innerHTML = `
                    <input type="text" name="${inputName}" placeholder="Link/Documento Anexado"
                           autocomplete="off" class="imagem-input" style="flex: 1;">
                    <button type="button" class="btn-remove-imagem" title="Remover">✕</button>
                `;
                list.appendChild(item);
                item.querySelector('input').focus();
                item.querySelector('.btn-remove-imagem')
                    .addEventListener('click', () => item.remove());
            });
        }

        // ================================================================
        // INICIALIZAÇÃO DE UM BLOCO DE IMÓVEL (por índice)
        // ================================================================
        function initImovelToggle(idx) {
            const scope = document.getElementById('imovel_' + idx) || document;

            // --- Identificação ---
            initSelectToggle(scope.querySelector('#campo221_' + idx), 'bloco-obs221_' + idx);
            initSelectToggle(scope.querySelector('#campo223_' + idx), 'bloco-obs223_' + idx);
            initDynamicList('btnAdicionarImagemIdent_' + idx, 'imagens-list-ident_' + idx);

            // --- Ocupação ---
            initSelectToggle(scope.querySelector('#campo31_' + idx),  'bloco-obs31_'  + idx);
            initSelectToggle(scope.querySelector('#campo35_' + idx),  'bloco-obs35_'  + idx);
            initRadioToggleSim('imoveis[' + idx + '][custos_manutencao]', 'bloco-obs37_' + idx, scope);
            initDynamicList('btnAdicionarImagemOcup_' + idx, 'imagens-list-ocup_' + idx);

            // --- Restrições: novas perguntas de faixas e áreas especiais ---
            initRadioToggleSim('imoveis[' + idx + '][faixa_fronteira]',  'bloco-desc-faixa-fronteira_'  + idx, scope);
            initRadioToggleSim('imoveis[' + idx + '][faixa_seguranca]',  'bloco-desc-faixa-seguranca_'  + idx, scope);
            initRadioToggleSim('imoveis[' + idx + '][faixa_dominio]',    'bloco-desc-faixa-dominio_'    + idx, scope);
            initRadioToggleSim('imoveis[' + idx + '][faixa_costa]',      'bloco-desc-faixa-costa_'      + idx, scope);
            initRadioToggleSim('imoveis[' + idx + '][circ_militar]',     'bloco-desc-circ-militar_'     + idx, scope);
            initRadioToggleSim('imoveis[' + idx + '][terra_indigena]',   'bloco-desc-terra-indigena_'   + idx, scope);
            initRadioToggleSim('imoveis[' + idx + '][quilombola]',       'bloco-desc-quilombola_'       + idx, scope);
            initRadioToggleSim('imoveis[' + idx + '][porto_organizado]', 'bloco-desc-porto_'            + idx, scope);
            initRadioToggleSim('imoveis[' + idx + '][reg_fundiaria]',    'bloco-desc-reg-fundiaria_'    + idx, scope);
            initRadioToggleSim('imoveis[' + idx + '][pdisp]',            'bloco-desc-pdisp_'            + idx, scope);
            initRadioToggleSim('imoveis[' + idx + '][rffsa]',            'bloco-desc-rffsa_'            + idx, scope);

            // --- Restrições: campos originais ---
            initRadioToggleSim('imoveis[' + idx + '][risco_invasao]',        'bloco-desc38_'  + idx, scope);
            initRadioToggleSim('imoveis[' + idx + '][risco_coletividade]',   'bloco-desc39_'  + idx, scope);
            initRadioToggleSim('imoveis[' + idx + '][acoes]',                'bloco-obs310_'  + idx, scope);
            initRadioToggleSim('imoveis[' + idx + '][tombado]',              'bloco-obs311_'  + idx, scope);
            initRadioToggleSim('imoveis[' + idx + '][conflitos_fundiarios]', 'bloco-obs312_'  + idx, scope);
            initRadioToggleSim('imoveis[' + idx + '][gestao_praias]',        'bloco-obs313_'  + idx, scope);
            initDynamicList('btnAdicionarImagemRest_' + idx, 'imagens-list-rest_' + idx);
        }

        // ================================================================
        // EXECUTA AO CARREGAR A PÁGINA
        // ================================================================
        document.addEventListener('DOMContentLoaded', function () {
            initImovelToggle(0);
        });

        // ================================================================
        // HOOK GLOBAL para foco-02.js ao criar novos imóveis dinamicamente.
        // ================================================================
        window.initImovelToggle = initImovelToggle;
    </script>
