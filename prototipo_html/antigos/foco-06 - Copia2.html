<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FOCO-06 — Proposta de Destinação</title>
    <link rel="stylesheet" href="styles-forms.css" />
    <link rel="stylesheet" href="hints.css" />
    <link rel="stylesheet" href="custom-select.css" />
</head>
<body>
    <div class="form-container">
        <h2>6: Proposta de Destinação</h2>
        <form id="form04" novalidate>

            <!-- 5.1 Tipo de procedimento -->
            <div class="form-group editavel">
                <label for="campo51">
                    Tipo de procedimento pretendido:
                    <span class="hint-semaforo">
                        <span class="hint-icon" data-hint-tipo="verde"
                            data-hint="Selecione o tipo de procedimento administrativo que origina esta análise de destinação."
                            role="tooltip" tabindex="0" aria-label="Ajuda: Tipo de procedimento">?</span>
                    </span>
                </label>
                <select id="campo51" name="tipo_procedimento" required>
                    <option value="" selected>Selecione...</option>
                    <option value="Nova destinação">Nova destinação: primeiro instrumento formal de destinação para o imóvel</option>
                    <option value="Renovação">Renovação: continuidade de instrumento vigente com as mesmas condições</option>
                    <option value="Alteração">Alteração: modificação de condições, finalidade ou área em instrumento vigente</option>
                    <option value="Regularização">Regularização: formalização de uso preexistente sem instrumento vigente</option>
                </select>
                <span class="error-msg" id="err51">Selecione o tipo de procedimento.</span>
                <div id="bloco51_obs" style="display:none;">
                    <label for="campo51_obs">Informações complementares:</label>
                    <textarea id="campo51_obs" name="campo51_obs"
                        placeholder="Informações complementares ao tipo de procedimento..."></textarea>
                </div>
            </div>

            <!-- 5.2 Tipo de uso imobiliário pretendido -->
            <div class="form-group editavel">
                <label for="campo52">
                    Tipo de uso imobiliário pretendido:
                    <span class="hint-semaforo">
                        <span class="hint-icon" data-hint-tipo="verde"
                            data-hint="Selecione o tipo de uso imobiliário pretendido conforme Tabela Taxonômica RESOLUÇÃO COMGC/SPU/MGI Nº 3/2025."
                            role="tooltip" tabindex="0" aria-label="Ajuda: Tipo de uso imobiliário pretendido">?</span>
                    </span>
                </label>
                <select id="campo52" name="tipo_uso_imobiliario" required>
                    <option value="" selected>Selecione...</option>
                    <option value="0101">01.01 Uso administrativo e representativo</option>
                    <option value="0102">01.02 Uso para agropecuária, aquicultura, produção florestal e pesca</option>
                    <option value="0103">01.03 Uso ambiental e dos recursos naturais</option>
                    <option value="0104">01.04 Uso cultural, esportivo e de lazer</option>
                    <option value="0105">01.05 Uso em eventos de curta duração</option>
                    <option value="0106">01.06 Uso habitacional</option>
                    <option value="0107">01.07 Uso industrial, comercial ou de prestação de serviços</option>
                    <option value="0108">01.08 Uso em infraestrutura de serviços públicos</option>
                    <option value="0109">01.09 Uso em infraestrutura de transportes</option>
                    <option value="0110">01.10 Uso multifinalitário em projeto de requalificação urbana</option>
                    <option value="0111">01.11 Uso por povos originários e comunidades tradicionais</option>
                    <option value="0112">01.12 Uso em serviço de ensino, pesquisa e extensão</option>
                    <option value="0113">01.13 Uso em serviço socioassistencial e de cidadania</option>
                    <option value="0114">01.14 Uso em serviços de saúde</option>
                    <option value="0115">01.15 Uso residencial para servidor</option>
                    <option value="0116">01.16 Uso para segurança pública e defesa nacional</option>
                    <option value="0117">01.17 Uso religioso</option>
                    <option value="0118">01.18 Sem informação</option>
                    <option value="0119">01.19 Sem uso definido/vinculado</option>
                </select>
            </div>

            <!-- 5.3 Tipo de uso específico pretendido -->
            <div class="form-group editavel">
                <label for="campo53">
                    Tipo de uso específico pretendido:
                    <span class="hint-semaforo">
                        <span class="hint-icon" data-hint-tipo="verde"
                            data-hint="Selecione o tipo de uso específico pretendido conforme Tabela Taxonômica RESOLUÇÃO COMGC/SPU/MGI Nº 3/2025."
                            role="tooltip" tabindex="0" aria-label="Ajuda: Tipo de uso específico pretendido">?</span>
                    </span>
                </label>
                <select id="campo53" name="tipo_uso_especifico" required disabled>
                    <option value="" selected>Selecione primeiro o tipo de uso imobiliário...</option>
                </select>
            </div>

            <!-- 5.4 Haverá modificação do terreno/edificação? -->
            <div class="form-group editavel">
                <label>
                    Há previsão de modificação do terreno, aterro ou retirada de material, que acresça ou diminua a área?
                    <span class="hint-semaforo">
                        <span class="hint-icon" data-hint-tipo="verde"
                            data-hint="Indique se a destinação proposta implica modificações físicas no terreno ou na edificação existente."
                            role="tooltip" tabindex="0" aria-label="Ajuda: Modificação do terreno/edificação">?</span>
                    </span>
                </label>
                <div class="radio-group" id="group-campo54">
                    <label class="radio-option"><input type="radio" name="campo54" value="Sim" required> Sim</label>
                    <label class="radio-option"><input type="radio" name="campo54" value="Não"> Não</label>
                    <label class="radio-option"><input type="radio" name="campo54" value="Sem informação"> Sem informação</label>
                </div>

                <div id="bloco54" style="display:none;">
                    <label for="campo54_desc">
                        Descrição da modificação prevista:
                        <span class="hint-semaforo">
                            <span class="hint-icon" data-hint-tipo="verde"
                                data-hint="Descreva as modificações físicas previstas no terreno ou na edificação."
                                role="tooltip" tabindex="0" aria-label="Ajuda: Descrição da modificação">?</span>
                        </span>
                    </label>
                    <textarea id="campo54_desc" name="campo54_desc"
                        placeholder="Descreva as modificações previstas no terreno ou na edificação..."></textarea>
                </div>
            </div>

            <!-- 5.5 Compatibilidade urbanística -->
            <div class="form-group editavel">
                <label for="campo55">
                    Compatibilidade urbanística [Catálogo: Conflito (incompatibilidade de zoneamento)]:
                    <span class="hint-semaforo">
                        <span class="hint-icon" data-hint-tipo="verde"
                            data-hint="Avalie a compatibilidade do uso proposto com as normas urbanísticas municipais vigentes (Plano Diretor, zoneamento, etc.)."
                            role="tooltip" tabindex="0" aria-label="Ajuda: Compatibilidade urbanística">?</span>
                    </span>
                </label>
                <select id="campo55" name="compatibilidade_urbanistica" required>
                    <option value="" selected>Selecione...</option>
                    <option value="Compatível">Compatível: uso proposto está em conformidade com o zoneamento e normas urbanísticas vigentes</option>
                    <option value="Compatível com restrições">Compatível com restrições: uso admitido com condicionantes ou mediante aprovação específica</option>
                    <option value="Incompatível">Incompatível: uso contrário às normas urbanísticas vigentes</option>
                    <option value="Não foi possível verificar">Não foi possível verificar: ausência de informações ou acesso às normas municipais</option>
                </select>
                <span class="error-msg" id="err55">Selecione a compatibilidade urbanística.</span>
                <div id="bloco55_obs" style="display:none;">
                    <label for="campo55_obs">Observações complementares:</label>
                    <textarea id="campo55_obs" name="campo55_obs"
                        placeholder="Observações sobre a compatibilidade urbanística..."></textarea>
                </div>
            </div>

            <!-- 5.6 Vinculação com Programas Estratégicos -->
            <div class="form-group editavel">
                <label>
                    Há Vinculação com Programas Estratégicos?
                    <span class="hint-semaforo">
                        <span class="hint-icon" data-hint-tipo="verde"
                            data-hint="Indique se a destinação proposta está vinculada a programas ou estratégias governamentais."
                            role="tooltip" tabindex="0" aria-label="Ajuda: Vinculação estratégica">?</span>
                    </span>
                </label>
                <div class="radio-group" id="group-campo56-radio">
                    <label class="radio-option"><input type="radio" name="campo56_radio" value="Sim" required> Sim</label>
                    <label class="radio-option"><input type="radio" name="campo56_radio" value="Não"> Não</label>
                    <label class="radio-option"><input type="radio" name="campo56_radio" value="Sem informação"> Sem informação</label>
                </div>
                <div id="group-campo56" style="display:none;">
                    <div class="checkbox-group">
                        <label class="checkbox-option"><input type="checkbox" name="campo56[]" value="Programa Minha Casa Minha Vida" id="campo56-mcmv" />Programa Minha Casa Minha Vida</label>
                        <label class="checkbox-option"><input type="checkbox" name="campo56[]" value="Programa de Regularização Fundiária (REURB)" id="campo56-reurb" />Programa de Regularização Fundiária (REURB)</label>
                        <label class="checkbox-option"><input type="checkbox" name="campo56[]" value="Programa de Desestatização/Privatização" id="campo56-priv" />Programa de Desestatização/Privatização</label>
                        <label class="checkbox-option"><input type="checkbox" name="campo56[]" value="Programa de infraestrutura federal" id="campo56-infra" />Programa de infraestrutura federal</label>
                        <label class="checkbox-option"><input type="checkbox" name="campo56[]" value="Plano de desenvolvimento regional" id="campo56-regional" />Plano de desenvolvimento regional</label>
                        <label class="checkbox-option"><input type="checkbox" name="campo56[]" value="Outro programa ou estratégia" id="campo56-outro" />Outro programa ou estratégia (descrever nas observações)</label>
                    </div>

                    <label for="campo56_obs">Observações complementares:</label>
                    <textarea id="campo56_obs" name="campo56_obs" placeholder="Descreva a vinculação estratégica..."></textarea>
                </div>
            </div>

            <!-- 5.7 Políticas vinculadas -->
            <div class="form-group editavel">
                <label>
                    Há vinculação com Políticas Públicas ou Programas Estratégicos?
                    <span class="hint-semaforo">
                        <span class="hint-icon" data-hint-tipo="verde"
                            data-hint="Indique as políticas públicas às quais a destinação proposta se vincula."
                            role="tooltip" tabindex="0" aria-label="Ajuda: Políticas vinculadas">?</span>
                    </span>
                </label>
                <div class="radio-group" id="group-campo57-radio">
                    <label class="radio-option"><input type="radio" name="campo57_radio" value="Sim" required> Sim</label>
                    <label class="radio-option"><input type="radio" name="campo57_radio" value="Não"> Não</label>
                    <label class="radio-option"><input type="radio" name="campo57_radio" value="Sem informação"> Sem informação</label>
                </div>
                <div id="group-campo57" style="display:none;">
                    <div class="checkbox-group">
                        <label class="checkbox-option"><input type="checkbox" name="campo57[]" value="Política Nacional de Habitação" id="campo57-habitacao" />Política Nacional de Habitação</label>
                        <label class="checkbox-option"><input type="checkbox" name="campo57[]" value="Política Nacional de Mobilidade Urbana" id="campo57-mobilidade" />Política Nacional de Mobilidade Urbana</label>
                        <label class="checkbox-option"><input type="checkbox" name="campo57[]" value="Política Nacional de Meio Ambiente" id="campo57-meioambiente" />Política Nacional de Meio Ambiente</label>
                        <label class="checkbox-option"><input type="checkbox" name="campo57[]" value="Política Nacional de Segurança Pública" id="campo57-seguranca" />Política Nacional de Segurança Pública</label>
                        <label class="checkbox-option"><input type="checkbox" name="campo57[]" value="Política Nacional de Defesa Nacional" id="campo57-defesa" />Política Nacional de Defesa Nacional</label>
                        <label class="checkbox-option"><input type="checkbox" name="campo57[]" value="Política Nacional de Saúde" id="campo57-saude" />Política Nacional de Saúde</label>
                        <label class="checkbox-option"><input type="checkbox" name="campo57[]" value="Política Nacional de Educação" id="campo57-educacao" />Política Nacional de Educação</label>
                        <label class="checkbox-option"><input type="checkbox" name="campo57[]" value="Outra política pública" id="campo57-outra" />Outra política pública (descrever nas observações)</label>
                    </div>

                    <label for="campo57_obs">Especificar:</label>
                    <textarea id="campo57_obs" name="campo57_obs" placeholder="Especifique as políticas vinculadas..."></textarea>
                </div>
            </div>

            <!-- 5.8 Impacto social esperado -->
            <div class="form-group editavel">
                <label>
                    Há expectativa de impacto social?
                    <span class="hint-semaforo">
                        <span class="hint-icon" data-hint-tipo="verde"
                            data-hint="Avalie o impacto social esperado da destinação proposta para a população beneficiada."
                            role="tooltip" tabindex="0" aria-label="Ajuda: Impacto social esperado">?</span>
                    </span>
                </label>
                <div class="radio-group" id="group-campo58-radio">
                    <label class="radio-option"><input type="radio" name="campo58_radio" value="Sim" required> Sim</label>
                    <label class="radio-option"><input type="radio" name="campo58_radio" value="Não"> Não</label>
                    <label class="radio-option"><input type="radio" name="campo58_radio" value="Sem informação"> Sem informação</label>
                </div>
                <div id="group-campo58" style="display:none;">
                    <select id="campo58" name="impacto_social">
                        <option value="" selected>Selecione...</option>
                        <option value="Alto impacto positivo">Alto impacto positivo: benefício expressivo e direto para a coletividade</option>
                        <option value="Médio impacto positivo">Médio impacto positivo: benefício moderado ou indireto para a coletividade</option>
                        <option value="Baixo impacto positivo">Baixo impacto positivo: benefício restrito ou pouco expressivo</option>
                        <option value="Sem impacto social relevante">Sem impacto social relevante: destinação sem reflexo significativo sobre a coletividade</option>
                        <option value="Impacto social negativo">Impacto social negativo: destinação pode gerar prejuízo social identificado</option>
                    </select>

                    <label for="campo58_obs">Observações complementares:</label>
                    <textarea id="campo58_obs" name="campo58_obs"
                        placeholder="Observações sobre o impacto social esperado..."></textarea>
                </div>
            </div>

            <!-- 5.9 Número de beneficiários -->
            <div class="form-group editavel">
                <label for="campo59">
                    Número estimado de beneficiários em potencial:
                    <span class="hint-semaforo">
                        <span class="hint-icon" data-hint-tipo="verde"
                            data-hint="Informe o número estimado de pessoas ou famílias beneficiadas diretamente pela destinação proposta."
                            role="tooltip" tabindex="0" aria-label="Ajuda: Número estimado de beneficiários">?</span>
                    </span>
                </label>
                <input type="number" id="campo59" name="num_beneficiarios" placeholder="0" min="0"
                    autocomplete="off" required />
            </div>

            <!-- 5.10 Impacto ambiental -->
            <div class="form-group editavel">
                <label>
                    Há expectativa de impacto ambiental?
                    <span class="hint-semaforo">
                        <span class="hint-icon" data-hint-tipo="verde"
                            data-hint="Avalie o impacto ambiental esperado da destinação proposta sobre o meio ambiente local e regional."
                            role="tooltip" tabindex="0" aria-label="Ajuda: Impacto ambiental esperado">?</span>
                    </span>
                </label>
                <div class="radio-group" id="group-campo510-radio">
                    <label class="radio-option"><input type="radio" name="campo510_radio" value="Sim" required> Sim</label>
                    <label class="radio-option"><input type="radio" name="campo510_radio" value="Não"> Não</label>
                    <label class="radio-option"><input type="radio" name="campo510_radio" value="Sem informação"> Sem informação</label>
                </div>
                <div id="group-campo510" style="display:none;">
                    <select id="campo510" name="impacto_ambiental">
                        <option value="" selected>Selecione...</option>
                        <option value="Impacto positivo">Impacto positivo: destinação contribui para recuperação ou preservação ambiental</option>
                        <option value="Sem impacto ambiental relevante">Sem impacto ambiental relevante: destinação não altera significativamente o meio ambiente</option>
                        <option value="Impacto negativo mitigável">Impacto negativo mitigável: impacto identificado, passível de controle por medidas mitigadoras</option>
                        <option value="Impacto negativo relevante">Impacto negativo relevante: impacto significativo com necessidade de licenciamento ambiental</option>
                    </select>

                    <label for="campo510_obs">Observações complementares:</label>
                    <textarea id="campo510_obs" name="campo510_obs"
                        placeholder="Observações sobre o impacto ambiental esperado..."></textarea>
                </div>
            </div>

            <!-- 5.11 Regime de destinação -->
            <div class="form-group editavel">
                <label for="campo511">
                    Regime de destinação proposto:
                    <span class="hint-semaforo">
                        <span class="hint-icon" data-hint-tipo="verde"
                            data-hint="Selecione o regime de destinação proposto conforme Tabela RESOLUÇÃO COMGC/SPU/MGI Nº 3/2025."
                            role="tooltip" tabindex="0" aria-label="Ajuda: Regime de destinação proposto">?</span>
                    </span>
                </label>
                <select id="campo511" name="regime_destinacao" required>
                    <option value="" selected>Selecione...</option>
                    <optgroup label="── 02.01 Regimes de direito real ──────────────────"></optgroup>
                    <optgroup label="  02.01.01 Regimes de transferência da propriedade"></optgroup>
                    <optgroup label="    02.01.01.01 Alienação imobiliária discricionária">
                        <option value="02.01.01.01.01">02.01.01.01.01 — Dação em pagamento</option>
                        <option value="02.01.01.01.02">02.01.01.01.02 — Doação</option>
                        <option value="02.01.01.01.03">02.01.01.01.03 — Integralização de cotas em Fundo de Investimento Imobiliário</option>
                        <option value="02.01.01.01.04">02.01.01.01.04 — Investidura</option>
                        <option value="02.01.01.01.05">02.01.01.01.05 — Permuta</option>
                        <option value="02.01.01.01.06.01">02.01.01.01.06.01 — Remição de foro gratuita</option>
                        <option value="02.01.01.01.06.02">02.01.01.01.06.02 — Remição de foro onerosa</option>
                        <option value="02.01.01.01.07">02.01.01.01.07 — Venda</option>
                    </optgroup>
                    <optgroup label="    02.01.01.02 Alienação imobiliária vinculada">
                        <option value="02.01.01.02.01">02.01.01.02.01 — Legitimação fundiária</option>
                        <option value="02.01.01.02.02">02.01.01.02.02 — Reconhecimento de domínio</option>
                        <option value="02.01.01.02.03">02.01.01.02.03 — Transferência de propriedade para fins de Reurb-S</option>
                        <option value="02.01.01.02.04">02.01.01.02.04 — Transferência de propriedade por dispositivo legal específico</option>
                    </optgroup>
                    <optgroup label="  02.01.02 Regimes de direito real limitado"></optgroup>
                    <optgroup label="    02.01.02.01 Aforamento">
                        <option value="02.01.02.01.01">02.01.02.01.01 — Aforamento gratuito</option>
                        <option value="02.01.02.01.02">02.01.02.01.02 — Aforamento oneroso</option>
                    </optgroup>
                    <optgroup label="    02.01.02.02 Concessão de Direito Real de Laje">
                        <option value="02.01.02.02.01">02.01.02.02.01 — Concessão de Direito Real de Laje Gratuita</option>
                        <option value="02.01.02.02.02">02.01.02.02.02 — Concessão de Direito Real de Laje Onerosa</option>
                    </optgroup>
                    <optgroup label="    02.01.02.03 Concessão de Direito Real de Uso">
                        <option value="02.01.02.03.01">02.01.02.03.01 — Concessão de Direito Real de Uso Gratuita</option>
                        <option value="02.01.02.03.02">02.01.02.03.02 — Concessão de Direito Real de Uso Onerosa</option>
                    </optgroup>
                    <optgroup label="    02.01.02.04 Concessão de Direito de Superfície">
                        <option value="02.01.02.04.01">02.01.02.04.01 — Concessão de Direito de Superfície Gratuita</option>
                        <option value="02.01.02.04.02">02.01.02.04.02 — Concessão de Direito de Superfície Onerosa</option>
                    </optgroup>
                    <optgroup label="    02.01.02.05 a 02.01.02.07">
                        <option value="02.01.02.05">02.01.02.05 — Concessão de Uso Especial para Fins de Moradia (CUEM)</option>
                        <option value="02.01.02.06">02.01.02.06 — Promessa de compra e venda</option>
                        <option value="02.01.02.07">02.01.02.07 — Transferência de Direito Real de Uso para Reurb-S</option>
                    </optgroup>
                    <optgroup label="── 02.02 Regimes de direito pessoal/obrigacional ─"></optgroup>
                    <option value="02.02.01">02.02.01 — Arrendamento</option>
                    <optgroup label="  02.02.02 Cessão de Uso">
                        <option value="02.02.02.01">02.02.02.01 — Cessão de Uso Gratuita</option>
                        <option value="02.02.02.02">02.02.02.02 — Cessão de Uso Onerosa</option>
                        <option value="02.02.02.03">02.02.02.03 — Cessão de Uso em Condições Especiais</option>
                        <option value="02.02.02.04">02.02.02.04 — Cessão de uso provisória</option>
                    </optgroup>
                    <option value="02.02.03">02.02.03 — Comodato</option>
                    <option value="02.02.04">02.02.04 — Locação para terceiros</option>
                    <option value="02.02.05">02.02.05 — Permissão de uso para fins residenciais</option>
                    <option value="02.02.06.01">02.02.06.01 — Transferência gratuita da posse</option>
                    <option value="02.02.06.02">02.02.06.02 — Transferência onerosa da posse</option>
                    <optgroup label="── 02.03 Regimes de transferência/compartilhamento de gestão ─"></optgroup>
                    <option value="02.03.01">02.03.01 — Acordo de Cooperação Técnica para Regularização Fundiária Urbana (ACT-Reurb)</option>
                    <option value="02.03.02">02.03.02 — Entrega</option>
                    <option value="02.03.03">02.03.03 — Entrega provisória</option>
                    <option value="02.03.04">02.03.04 — Guarda Provisória</option>
                    <option value="02.03.05">02.03.05 — Transferência de gestão por determinação legal</option>
                    <option value="02.03.06">02.03.06 — Transferência de gestão de orlas e praias</option>
                    <optgroup label="── 02.04 Regimes de Outorga ──────────────────────"></optgroup>
                    <option value="02.04.01">02.04.01 — Autorização de obras</option>
                    <option value="02.04.02.01">02.04.02.01 — Autorização de passagem gratuita</option>
                    <option value="02.04.02.02">02.04.02.02 — Autorização de passagem onerosa</option>
                    <option value="02.04.03">02.04.03 — Autorização de uso para fins comerciais</option>
                    <option value="02.04.04">02.04.04 — Autorização de Uso Sustentável</option>
                    <option value="02.04.05">02.04.05 — Inscrição de ocupação</option>
                    <option value="02.04.06">02.04.06 — Permissão de uso para eventos</option>
                </select>

                <div id="bloco511_obs" style="display:none;">
                    <label for="campo511_obs">Observações complementares:</label>
                    <textarea id="campo511_obs" name="campo511_obs"
                        placeholder="Observações sobre o regime de destinação proposto..."></textarea>
                </div>
            </div>

            <!-- Observações / Upload -->
