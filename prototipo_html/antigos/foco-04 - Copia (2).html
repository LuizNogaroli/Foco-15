<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>FOCO-04 — Análise do Imóvel</title>
<link rel="stylesheet" href="styles-forms.css" />
<link rel="stylesheet" href="hints.css" />
</head>
<body>
<div class="form-container">
<h2>4: Análise do Imóvel</h2>
<form id="form0203" novalidate>
  <div id="imoveis-container">

    <!-- ==================== OCUPAÇÃO ==================== -->
    <h4 style="margin: 24px 0 16px 0; color: #0056b3; border-bottom: 2px solid #ddd; padding-bottom: 8px;">Ocupação</h4>

    <!-- 3.1 Situação ocupacional -->
    <div class="form-group editavel">
      <label for="campo31_0">Situação ocupacional:</label>
      <select id="campo31_0" name="imoveis[0][situacao_ocupacional]" required>
        <option value="" selected>Selecione...</option>
        <option value="Desocupado">Desocupado</option>
        <option value="Ocupado regularmente">Ocupado regularmente</option>
        <option value="Ocupado irregularmente">Ocupado irregularmente</option>
        <option value="Em disputa judicial">Em disputa judicial</option>
        <option value="Parcialmente ocupado">Parcialmente ocupado</option>
      </select>
      <div id="bloco-obs31_0" style="display: none; flex-direction: column; gap: 6px; margin-top: 8px;">
        <label for="obs31_0">Observações complementares:</label>
        <textarea id="obs31_0" name="imoveis[0][obs_situacao_ocupacional]" placeholder="Observações sobre a situação ocupacional..."></textarea>
      </div>
    </div>

    <!-- 3.4 Tempo de ocupação -->
    <div class="form-group editavel">
      <label for="campo34_0">Tempo de ocupação:</label>
      <input type="text" id="campo34_0" name="imoveis[0][tempo_ocupacao]" value="01" placeholder="Ex: 03/2010 ou 2010" autocomplete="off">
    </div>

    <!-- 3.2 Tipo de uso atual -->
    <div class="form-group editavel">
      <label for="campo32_0">Tipo de uso imobiliário atual:</label>
      <select id="campo32_0" name="imoveis[0][tipo_uso_atual]" required>
        <option value="" disabled selected>Selecione...</option>
        <option value="Residencial">Residencial</option>
        <option value="Comercial">Comercial</option>
        <option value="Industrial">Industrial</option>
        <option value="Institucional">Institucional</option>
        <option value="Infraestrutura">Infraestrutura</option>
        <option value="Uso misto">Uso misto</option>
        <option value="Sem uso definido">Sem uso definido</option>
      </select>
    </div>

    <!-- 3.3 Uso específico atual -->
    <div class="form-group editavel">
      <label for="campo33_0">Tipo de uso específico atual:</label>
      <select id="campo33_0" name="imoveis[0][tipo_uso_especifico_atual]">
        <option value="" selected>Selecione...</option>
        <option value="Moradia unifamiliar">Moradia unifamiliar</option>
        <option value="Moradia multifamiliar">Moradia multifamiliar</option>
        <option value="Habitação de interesse social">Habitação de interesse social</option>
        <option value="Escritório/sede administrativa">Escritório/sede administrativa</option>
        <option value="Escola/instituição de ensino">Escola/instituição de ensino</option>
        <option value="Unidade de saúde">Unidade de saúde</option>
        <option value="Equipamento de segurança pública">Equipamento de segurança pública</option>
        <option value="Equipamento de defesa nacional">Equipamento de defesa nacional</option>
        <option value="Área de lazer/recreação">Área de lazer/recreação</option>
        <option value="Armazenagem/logística">Armazenagem/logística</option>
        <option value="Outro">Outro</option>
      </select>
    </div>

    <!-- 3.5 Incidência ambiental -->
    <div class="form-group editavel">
      <label for="campo35_0">Incidência ambiental:</label>
      <select id="campo35_0" name="imoveis[0][incidencia_ambiental]" required>
        <option value="" selected>Selecione...</option>
        <option value="APP">APP (Área de Preservação Permanente): Área protegida por legislação ambiental específica, com restrições severas de uso e ocupação</option>
        <option value="Unidade de Conservação">Unidade de Conservação: Inserida em UC federal, estadual ou municipal, sujeito a regime próprio de proteção</option>
        <option value="Área de risco">Área de risco: Zona com instabilidade geotécnica, inundação recorrente ou outro risco físico relevante</option>
        <option value="Área contaminada">Área contaminada: Presença de passivo ambiental identificado ou potencial</option>
        <option value="Nenhuma incidência relevante">Nenhuma incidência relevante identificada: Não foram constatadas restrições ambientais significativas</option>
        <option value="Outra">Outra situação específica (descrever nas observações)</option>
      </select>
      <div id="bloco-obs35_0" style="display: none; flex-direction: column; gap: 6px; margin-top: 8px;">
        <label for="obs35_0">Observações complementares (Ambiental):</label>
        <textarea id="obs35_0" name="imoveis[0][obs_incidencia_ambiental]" placeholder="Observações sobre a incidência ambiental..."></textarea>
      </div>
    </div>

    <!-- 3.6 Custos SPU -->
    <div class="form-group editavel">
      <label>Há custos de manutenção (SPU)?</label>
      <div class="radio-group" id="group-custos_0">
        <label class="radio-option"><input type="radio" name="imoveis[0][custos_manutencao]" value="Sim" id="custos-sim_0"> Sim</label>
        <label class="radio-option"><input type="radio" name="imoveis[0][custos_manutencao]" value="Não" id="custos-nao_0"> Não</label>
      </div>
      <div id="bloco-obs37_0" style="display: none; flex-direction: column; gap: 6px; margin-top: 8px;">
        <label for="campo37_0">Estimativa de custos anuais (R$):</label>
        <input type="text" id="campo37_0" name="imoveis[0][estimativa_custos]" value="R$ 15.000,00" placeholder="R$ 0,00" autocomplete="off" />
      </div>
    </div>

    <!-- ==================== RISCOS ==================== -->
    <h4 style="margin: 0px 0 16px 0; color: #0056b3; border-bottom: 2px solid #ddd; padding-bottom: 8px;">Riscos</h4>

    <!-- 3.8 Risco invasão -->
    <div class="form-group editavel">
      <label>Risco de invasão/esbulho?</label>
      <div class="radio-group" id="group-invasao_0">
        <label class="radio-option"><input type="radio" name="imoveis[0][risco_invasao]" value="Sim"> Sim</label>
        <label class="radio-option"><input type="radio" name="imoveis[0][risco_invasao]" value="Não"> Não</label>
        <label class="radio-option"><input type="radio" name="imoveis[0][risco_invasao]" value="Não há como avaliar"> Não há como avaliar</label>
      </div>
      <div id="bloco-desc38_0" style="display: none; flex-direction: column; gap: 6px; margin-top: 8px;">
        <label for="desc38_0">Descrever Risco Invasão:</label>
        <textarea id="desc38_0" name="imoveis[0][desc_risco_invasao]" placeholder="Descreva o risco de invasão/esbulho..."></textarea>
      </div>
    </div>

    <!-- 3.9 Riscos para coletividade -->
    <div class="form-group editavel">
      <label>Riscos para coletividade? <span class="hint-semaforo">
        <span class="hint-icon" data-hint-tipo="verde" data-hint="O estado de conservação ou uso pode comprometer a estabilidade do prédio ou causar situações de risco." role="tooltip" tabindex="0" aria-label="Ajuda: Riscos para coletividade">?</span>
      </span></label>
      <div class="radio-group" id="group-risco-coletividade_0">
        <label class="radio-option"><input type="radio" name="imoveis[0][risco_coletividade]" value="Sim"> Sim</label>
        <label class="radio-option"><input type="radio" name="imoveis[0][risco_coletividade]" value="Não"> Não</label>
        <label class="radio-option"><input type="radio" name="imoveis[0][risco_coletividade]" value="Não há como avaliar"> Não há como avaliar</label>
      </div>
      <div id="bloco-desc39_0" style="display: none; flex-direction: column; gap: 6px; margin-top: 8px;">
        <label for="desc39_0">Descrever Riscos Coletividade:</label>
        <textarea id="desc39_0" name="imoveis[0][desc_risco_coletividade]" placeholder="Descreva os riscos para a coletividade..."></textarea>
      </div>
    </div>

    <!-- ==================== RESTRIÇÕES ==================== -->
    <h4 style="margin: 24px 0 16px 0; color: #0056b3; border-bottom: 2px solid #ddd; padding-bottom: 8px;">Restrições</h4>

    <div class="form-group editavel">
      <label>Selecione as restrições incidentes sobre o imóvel (pode marcar mais de uma):</label>

      <div class="checkbox-group" id="group-restricoes_0" style="display: flex; flex-direction: column; gap: 10px; margin-top: 8px;">

        <label class="checkbox-option">
          <input type="checkbox" name="imoveis[0][restricoes][]" value="Faixa de fronteira" id="chk-faixa-fronteira_0">
          Faixa de fronteira
          <span class="hint-semaforo"><span class="hint-icon" data-hint-tipo="verde" data-hint="Faixa de até 150 km de largura ao longo das fronteiras terrestres, considerada indispensável à segurança nacional (Lei nº 6.634/1979)." role="tooltip" tabindex="0" aria-label="Ajuda: Faixa de fronteira">?</span></span>
        </label>

        <label class="checkbox-option">
          <input type="checkbox" name="imoveis[0][restricoes][]" value="Faixa de segurança" id="chk-faixa-seguranca_0">
          Faixa de segurança
          <span class="hint-semaforo"><span class="hint-icon" data-hint-tipo="verde" data-hint="Faixas de segurança definidas por legislação específica para proteção de infraestruturas, instalações estratégicas ou áreas sensíveis." role="tooltip" tabindex="0" aria-label="Ajuda: Faixa de segurança">?</span></span>
        </label>

        <label class="checkbox-option">
          <input type="checkbox" name="imoveis[0][restricoes][]" value="Faixa de domínio Ferrovia/Rodovia" id="chk-faixa-dominio_0">
          Faixa de domínio Ferrovia/Rodovia
          <span class="hint-semaforo"><span class="hint-icon" data-hint-tipo="verde" data-hint="Área de domínio público ao longo de rodovias e ferrovias, sujeita a restrições de uso e ocupação conforme legislação vigente." role="tooltip" tabindex="0" aria-label="Ajuda: Faixa de domínio Ferrovia/Rodovia">?</span></span>
        </label>

        <label class="checkbox-option">
          <input type="checkbox" name="imoveis[0][restricoes][]" value="Faixa de 100 metros ao longo da costa marítima" id="chk-faixa-costa_0">
          Faixa de 100 (cem) metros ao longo da costa marítima
          <span class="hint-semaforo"><span class="hint-icon" data-hint-tipo="verde" data-hint="Faixa de 100 metros ao longo da costa marítima, reservada conforme o Decreto-Lei nº 9.760/1946 e legislação correlata." role="tooltip" tabindex="0" aria-label="Ajuda: Faixa de 100m costa marítima">?</span></span>
        </label>

        <label class="checkbox-option">
          <input type="checkbox" name="imoveis[0][restricoes][]" value="Circunferência de 1.320 metros em torno de instalações militares" id="chk-circ-militar_0">
          Ao longo de uma circunferência de 1.320 (mil trezentos e vinte) metros de raio em torno das fortificações e estabelecimentos militares
          <span class="hint-semaforo"><span class="hint-icon" data-hint-tipo="verde" data-hint="Área de restrição no entorno de instalações militares e fortificações, conforme legislação de segurança nacional vigente." role="tooltip" tabindex="0" aria-label="Ajuda: Circunferência 1.320m instalações militares">?</span></span>
        </label>

        <label class="checkbox-option">
          <input type="checkbox" name="imoveis[0][restricoes][]" value="Terra indígena" id="chk-terra-indigena_0">
          Terra indígena
          <span class="hint-semaforo"><span class="hint-icon" data-hint-tipo="verde" data-hint="Terras tradicionalmente ocupadas por povos indígenas, demarcadas ou em processo de demarcação, conforme art. 231 da Constituição Federal." role="tooltip" tabindex="0" aria-label="Ajuda: Terra indígena">?</span></span>
        </label>

        <label class="checkbox-option">
          <input type="checkbox" name="imoveis[0][restricoes][]" value="Território quilombola ou área de comunidade tradicional" id="chk-quilombola_0">
          Território quilombola ou área de comunidade tradicional
          <span class="hint-semaforo"><span class="hint-icon" data-hint-tipo="verde" data-hint="Territórios de comunidades remanescentes de quilombos ou outras comunidades tradicionais, conforme art. 68 do ADCT e legislação específica." role="tooltip" tabindex="0" aria-label="Ajuda: Território quilombola ou comunidade tradicional">?</span></span>
        </label>

        <label class="checkbox-option">
          <input type="checkbox" name="imoveis[0][restricoes][]" value="Poligonal de Porto Organizado" id="chk-porto_0">
          Poligonal de Porto Organizado
          <span class="hint-semaforo"><span class="hint-icon" data-hint-tipo="verde" data-hint="Área delimitada pelo poder público dentro da qual se exercem as atividades portuárias, conforme Lei nº 12.815/2013 (Lei dos Portos)." role="tooltip" tabindex="0" aria-label="Ajuda: Poligonal de Porto Organizado">?</span></span>
        </label>

        <label class="checkbox-option">
          <input type="checkbox" name="imoveis[0][restricoes][]" value="Área de regularização fundiária" id="chk-reg-fundiaria_0">
          Área de regularização fundiária
          <span class="hint-semaforo"><span class="hint-icon" data-hint-tipo="verde" data-hint="Área sujeita a processo de regularização fundiária urbana (REURB) ou rural, conforme Lei nº 13.465/2017 ou legislação específica." role="tooltip" tabindex="0" aria-label="Ajuda: Área de regularização fundiária">?</span></span>
        </label>

        <label class="checkbox-option">
          <input type="checkbox" name="imoveis[0][restricoes][]" value="Possui PDISP" id="chk-pdisp_0">
          Possui PDISP
          <span class="hint-semaforo"><span class="hint-icon" data-hint-tipo="verde" data-hint="Plano de Disposição de Imóveis do Sistema de Patrimônio da União — instrumento de planejamento que define a destinação prevista para o imóvel." role="tooltip" tabindex="0" aria-label="Ajuda: PDISP">?</span></span>
        </label>

        <label class="checkbox-option">
          <input type="checkbox" name="imoveis[0][restricoes][]" value="Área operacional da RFFSA" id="chk-rffsa_0">
          Área operacional da RFFSA
          <span class="hint-semaforo"><span class="hint-icon" data-hint-tipo="verde" data-hint="Áreas pertencentes ao acervo da extinta Rede Ferroviária Federal S.A. (RFFSA), cujos bens foram transferidos à União e se encontram sob gestão de diferentes órgãos." role="tooltip" tabindex="0" aria-label="Ajuda: Área operacional da RFFSA">?</span></span>
        </label>

        <label class="checkbox-option">
          <input type="checkbox" name="imoveis[0][restricoes][]" value="Zona/Área de Interesse Social (ZEIS)" id="chk-zeis_0">
          Zona/Área de Interesse Social (ZEIS)
          <span class="hint-semaforo"><span class="hint-icon" data-hint-tipo="verde" data-hint="Zonas Especiais de Interesse Social (ZEIS) são áreas urbanas destinadas prioritariamente à produção e manutenção de habitação de interesse social, conforme Plano Diretor Municipal." role="tooltip" tabindex="0" aria-label="Ajuda: ZEIS">?</span></span>
        </label>

        <label class="checkbox-option">
          <input type="checkbox" name="imoveis[0][restricoes][]" value="Área de segurança" id="chk-area-seguranca_0">
          Área de segurança
          <span class="hint-semaforo"><span class="hint-icon" data-hint-tipo="verde" data-hint="Área com restrições especiais de uso e ocupação por razões de segurança pública, nacional ou de infraestrutura crítica, conforme legislação aplicável." role="tooltip" tabindex="0" aria-label="Ajuda: Área de segurança">?</span></span>
        </label>

        <label class="checkbox-option">
          <input type="checkbox" name="imoveis[0][restricoes][]" value="Área Non Aedificandi" id="chk-non-aedificandi_0">
          Área Non Aedificandi
          <span class="hint-semaforo"><span class="hint-icon" data-hint-tipo="verde" data-hint="Área onde é vedada qualquer edificação, em razão de legislação urbanística, ambiental ou de infraestrutura (ex: faixas de recuo obrigatório, entorno de linhas de transmissão, margens de cursos d'água)." role="tooltip" tabindex="0" aria-label="Ajuda: Área Non Aedificandi">?</span></span>
        </label>

        <label class="checkbox-option">
          <input type="checkbox" name="imoveis[0][restricoes][]" value="Restrição de uso/ocupação incidente sobre o imóvel" id="chk-outra-restricao_0">
          Restrição de uso/ocupação incidente sobre o imóvel
          <span class="hint-semaforo"><span class="hint-icon" data-hint-tipo="verde" data-hint="Indique se existe qualquer outra restrição legal, administrativa ou urbanística de uso e ocupação não enquadrada nas categorias anteriores." role="tooltip" tabindex="0" aria-label="Ajuda: Outra restrição de uso/ocupação">?</span></span>
        </label>

        <label class="checkbox-option">
          <input type="checkbox" name="imoveis[0][restricoes][]" value="Ações judiciais ou de órgãos de controle" id="chk-acoes_0">
          Ações judiciais ou de órgãos de controle
          <span class="hint-semaforo"><span class="hint-icon" data-hint-tipo="verde" data-hint="Selecione as ações judiciais ou de controle externo que incidem sobre o imóvel." role="tooltip" tabindex="0" aria-label="Ajuda: Ações judiciais">?</span></span>
        </label>

        <label class="checkbox-option">
          <input type="checkbox" name="imoveis[0][restricoes][]" value="Tombado como patrimônio histórico, artístico e/ou cultural" id="chk-tombado_0">
          Tombado como patrimônio histórico, artístico e/ou cultural (Federal; Estadual; Municipal)
          <span class="hint-semaforo"><span class="hint-icon" data-hint-tipo="verde" data-hint="Indique se o imóvel é tombado pelo patrimônio histórico e/ou artístico." role="tooltip" tabindex="0" aria-label="Ajuda: Imóvel tombado">?</span></span>
        </label>

        <label class="checkbox-option">
          <input type="checkbox" name="imoveis[0][restricoes][]" value="Conflitos fundiários/sociais" id="chk-conflitos_0">
          Conflitos fundiários/sociais
          <span class="hint-semaforo"><span class="hint-icon" data-hint-tipo="verde" data-hint="Indique se há conflitos fundiários ou sociais identificados no imóvel ou entorno." role="tooltip" tabindex="0" aria-label="Ajuda: Conflitos fundiários">?</span></span>
        </label>

        <label class="checkbox-option">
          <input type="checkbox" name="imoveis[0][restricoes][]" value="Termo Gestão Praias/PGI" id="chk-gestao-praias_0">
          Termo Gestão Praias/PGI
          <span class="hint-semaforo"><span class="hint-icon" data-hint-tipo="verde" data-hint="Indique se o imóvel está inserido em área com Termo de Gestão de Praias ou Plano de Gestão Integrada vigente." role="tooltip" tabindex="0" aria-label="Ajuda: Termo de Gestão Praias">?</span></span>
        </label>

      </div><!-- fim checkbox-group -->

      <!-- Campo de observações — aparece quando qualquer checkbox for marcado -->
      <div id="bloco-obs-restricoes_0" style="display: none; flex-direction: column; gap: 6px; margin-top: 16px;">
        <label for="obs-restricoes_0">Observações sobre as restrições marcadas:</label>
        <textarea id="obs-restricoes_0" name="imoveis[0][obs_restricoes]" placeholder="Descreva informações complementares sobre as restrições selecionadas..."></textarea>
      </div>

    </div><!-- fim form-group restrições -->

    <!-- Observações / Upload -->
    <div class="form-group editavel">
      <label for="obs224_0">Observações:</label>
      <textarea id="obs224_0" name="imoveis[0][obs_geral_ident]" placeholder=""></textarea>
      <div class="dynamic-list-wrapper" style="flex: 1; display: flex; flex-direction: column; gap: 8px;">
        <button type="button" class="btn-add" id="btnAdicionarImagemIdent_0" style="align-self: flex-start;">＋ Adicionar link/documento</button>
        <div id="imagens-list-ident_0"></div>
      </div>
    </div>

  </div> <!-- Fim imoveis-container -->

  <!-- Botões -->
  <div class="button-group" style="margin-top:30px;">
    <button type="button" class="btn-secondary" id="btnLimpar">🗑️ Limpar</button>
    <button type="button" id="btnImprimir" onclick="window.print()">🖨️ Imprimir</button>
    <button type="submit" id="btnEnviar">✅ Salvar rascunho</button>
  </div>
</form>
</div>

<script src="formulario.js"></script>
<script src="hints.js"></script>
<script src="foco-04.js"></script>
<script>
  // ── Visibilidade obs. situação ocupacional ──────────────────────────────────
  (function () {
    const sel = document.getElementById('campo31_0');
    const bloco = document.getElementById('bloco-obs31_0');
    if (!sel || !bloco) return;
    const check = () => {
      const mostrar = ['Ocupado irregularmente', 'Em disputa judicial', 'Parcialmente ocupado'].includes(sel.value);
      bloco.style.display = mostrar ? 'flex' : 'none';
    };
    sel.addEventListener('change', check);
    check();
  })();

  // ── Visibilidade obs. incidência ambiental ──────────────────────────────────
  (function () {
    const sel = document.getElementById('campo35_0');
    const bloco = document.getElementById('bloco-obs35_0');
    if (!sel || !bloco) return;
    sel.addEventListener('change', () => {
      bloco.style.display = sel.value === 'Outra' ? 'flex' : 'none';
    });
  })();

  // ── Visibilidade estimativa de custos ───────────────────────────────────────
  (function () {
    const radios = document.querySelectorAll('input[name="imoveis[0][custos_manutencao]"]');
    const bloco  = document.getElementById('bloco-obs37_0');
    if (!bloco) return;
    radios.forEach(r => r.addEventListener('change', () => {
      bloco.style.display = r.value === 'Sim' && r.checked ? 'flex' : 'none';
    }));
  })();

  // ── Visibilidade desc. risco invasão ────────────────────────────────────────
  (function () {
    const radios = document.querySelectorAll('input[name="imoveis[0][risco_invasao]"]');
    const bloco  = document.getElementById('bloco-desc38_0');
    if (!bloco) return;
    radios.forEach(r => r.addEventListener('change', () => {
      bloco.style.display = r.value === 'Sim' && r.checked ? 'flex' : 'none';
    }));
  })();

  // ── Visibilidade desc. risco coletividade ───────────────────────────────────
  (function () {
    const radios = document.querySelectorAll('input[name="imoveis[0][risco_coletividade]"]');
    const bloco  = document.getElementById('bloco-desc39_0');
    if (!bloco) return;
    radios.forEach(r => r.addEventListener('change', () => {
      bloco.style.display = r.value === 'Sim' && r.checked ? 'flex' : 'none';
    }));
  })();

  // ── Visibilidade obs. restrições (checkboxes) ───────────────────────────────
  (function () {
    const grupo = document.getElementById('group-restricoes_0');
    const bloco = document.getElementById('bloco-obs-restricoes_0');
    if (!grupo || !bloco) return;
    const checkboxes = grupo.querySelectorAll('input[type="checkbox"]');
    const atualizar = () => {
      const algumMarcado = Array.from(checkboxes).some(cb => cb.checked);
      bloco.style.display = algumMarcado ? 'flex' : 'none';
    };
    checkboxes.forEach(cb => cb.addEventListener('change', atualizar));
    atualizar();
  })();
</script>
</body>
</html>
