<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FOCO-03 — Análise do Destinatário</title>
    <link rel="stylesheet" href="styles-forms.css">
    <link rel="stylesheet" href="hints.css">
    <style>
        /* CSS para ocultar bloco41 inicialmente */
        #bloco41 { display: none; }
        /* CSS para ocultar bloco43_obs inicialmente */
        #bloco43_obs { display: none; }
        /* CSS para layout em 3 colunas do grupo de checkboxes */
        #group-campo42 {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
        }
    </style>
</head>
<body>
    <div class="form-container">
        <h2>3: Análise do Destinatário</h2>
        <form id="form04" novalidate>
            <!-- 4.1 Destinação ativa -->
            <div class="form-group editavel">
                <label>
                    Requerente/interessado possui destinação ativa?
                    <span class="hint-semaforo">
                        <span
                            class="hint-icon hint-link"
                            data-hint-tipo="verde"
                            data-popup="hints/destinacao_ativa.html"
                            data-hint="Clique para abrir informações detalhadas sobre destinação ativa."
                            role="button"
                            tabindex="0"
                            aria-label="Ajuda: Destinação ativa"
                        >?</span>
                    </span>
                </label>
                <div class="radio-group" id="group-campo41">
                    <label class="radio-option">
                        <input type="radio" name="campo41" value="Sim" required> Sim
                    </label>
                    <label class="radio-option">
                        <input type="radio" name="campo41" value="Não"> Não
                    </label>
                </div>
                <span class="error-msg" id="err41">Selecione uma opção.</span>
            </div>
            <!-- 4.1 → Subgrupo: contratos -->
            <div class="form-group editavel" id="bloco41">
                <label for="campo41_contratos">
                    Contratos relacionados à destinação ativa
                    <span class="hint-semaforo">
                        <span
                            class="hint-icon"
                            data-hint-tipo="verde"
                            data-hint="Indique os números e tipos dos contratos relacionados à destinação ativa vigente."
                            role="tooltip"
                            tabindex="0"
                            aria-label="Ajuda: Contratos relacionados"
                        >?</span>
                    </span>
                </label>
                <textarea
                    id="campo41_contratos"
                    name="campo41_contratos"
                    placeholder="Ex: Contrato de Cessão de Uso nº 001/2020, vigência até 12/2025..."
                    required
                ></textarea>
            </div>
            <!-- 4.2 Pendências identificadas -->
            <div class="form-group editavel">
                <label>
                    Requerente/interessado apresenta algum tipo de pendência contratual (destinações ativas ou não)?
                    <span class="hint-semaforo">
                        <span
                            class="hint-icon"
                            data-hint-tipo="verde"
                            data-hint="Indique as pendências identificadas em relação ao destinatário ou ao instrumento de destinação."
                            role="tooltip"
                            tabindex="0"
                            aria-label="Ajuda: Pendências identificadas"
                        >?</span>
                    </span>
                </label>
                <div class="checkbox-group" id="group-campo42">
                    <label class="checkbox-option">
                        <input type="checkbox" name="campo42[]" value="Nenhuma identificada" id="campo42-nenhuma">
                        Nenhuma identificada
                    </label>
                    <label class="checkbox-option">
                        <input type="checkbox" name="campo42[]" value="Inadimplência financeira" id="campo42-inadimplencia">
                        Inadimplência financeira
                    </label>
                    <label class="checkbox-option">
                        <input type="checkbox" name="campo42[]" value="Pendências contratuais" id="campo42-contratuais">
                        Pendências contratuais
                    </label>
                    <label class="checkbox-option">
                        <input type="checkbox" name="campo42[]" value="Irregularidade cadastral" id="campo42-cadastral">
                        Irregularidade cadastral
                    </label>
                    <label class="checkbox-option">
                        <input type="checkbox" name="campo42[]" value="Uso em desacordo com o autorizado" id="campo42-uso">
                        Uso em desacordo com o autorizado
                    </label>
                    <label class="checkbox-option">
                        <input type="checkbox" name="campo42[]" value="Outras" id="campo42-outras">
                        Outras
                    </label>
                </div>
                <span class="error-msg" id="err42">Selecione ao menos uma opção.</span>
                <label for="campo42_obs">Observações complementares:</label>
                <textarea
                    id="campo42_obs"
                    name="campo42_obs"
                    placeholder="Descreva as pendências identificadas..."
                required
                ></textarea>
            </div>
            <!-- 4.3 Capacidade técnica demonstrada -->
            <div class="form-group editavel">
                <label for="campo43">
                    Capacidade técnica demonstrada:
                    <span class="hint-semaforo">
                        <span
                            class="hint-icon"
                            data-hint-tipo="verde"
                            data-hint="Avalie a capacidade técnica do destinatário para arcar com as obrigações do instrumento de destinação."
                            role="tooltip"
                            tabindex="0"
                            aria-label="Ajuda: Capacidade técnica"
                        >?</span>
                    </span>
                </label>
                <select id="campo43" name="campo43" required>
                    <option value="">Selecione...</option>
                    <option value="Demonstrada formalmente">Demonstrada formalmente: documentação comprobatória apresentada e analisada</option>
                    <option value="Demonstrada informalmente">Demonstrada informalmente: evidências indiretas sem documentação formal</option>
                    <option value="Não demonstrada">Não demonstrada: ausência de informações ou documentação insuficiente</option>
                    <option value="Não se aplica">Não se aplica: destinação gratuita ou sem contraprestação financeira</option>
                </select>
                <span class="error-msg" id="err43">Selecione a capacidade técnica.</span>
            </div>
            <!-- 4.3 → Observações complementares (condicional) -->
            <div class="form-group editavel" id="bloco43_obs">
                <label for="campo43_obs">Observações complementares:</label>
                <textarea
                    id="campo43_obs"
                    name="campo43_obs"
                    placeholder="Observações sobre a capacidade técnica..."
                required
                ></textarea>
            </div>
            <!-- 2.20 Imagens/plantas do imóvel -->
            <div class="form-group editavel">
                <label>Documentos adicionais:</label>
                <div class="dynamic-list-wrapper" style="flex: 1; display: flex; flex-direction: column; gap: 8px;">
                    <div id="imagens-list_0">
                        <div class="imagem-item">
                            <input type="text" name="imoveis[0][imagens][]" value="" placeholder="Faça upload dos documentos adicionais..." autocomplete="off" class="imagem-input" style="flex: 1;">
                            <button type="button" class="btn-remove-imagem" title="Remover">✕</button>
                        </div>
                    </div>
                    <button type="button" class="btn-add" id="btnAdicionarImagem_0" style="align-self: flex-start;">＋ Adicionar link/documento</button>
                </div>
            </div>
            <!-- Botões -->
            <div class="button-group">
                <button type="button" class="btn-secondary" id="btnLimpar">🗑️ Limpar</button>
                <button type="button" class="btn-print" id="btnImprimir" onclick="window.print()">🖨️ Imprimir / Salvar PDF</button>
                <button type="submit" id="btnEnviar">✅ Salvar</button>
            </div>
        </form>
    </div>
    <script src="formulario.js"></script>
    <script src="hints.js"></script>
    <script src="foco-04.js"></script>

    <!-- Script para mostrar/ocultar bloco41 condicionalmente -->
    <script>
        document.addEventListener('change', function(event) {
            if (event.target.matches('input[name="campo41"]')) {
                const bloco41 = document.getElementById('bloco41');
                
                if (event.target.value === 'Sim') {
                    bloco41.style.display = 'block';
                } else {
                    bloco41.style.display = 'none';
                }
            }
        });
    </script>

    <!-- Script para mostrar/ocultar bloco43_obs condicionalmente -->
    <script>
        document.addEventListener('change', function(event) {
            if (event.target.matches('select[name="campo43"]')) {
                const bloco43_obs = document.getElementById('bloco43_obs');
                const selectValue = event.target.value;
                
                // Mostra o bloco se uma opção válida (não vazia) for selecionada
                if (selectValue && selectValue !== '') {
                    bloco43_obs.style.display = 'block';
                } else {
                    bloco43_obs.style.display = 'none';
                }
            }
        });
    </script>
</body>
</html>
