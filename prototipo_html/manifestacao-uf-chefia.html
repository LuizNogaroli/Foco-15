<!DOCTYPE html>
<html lang="pt-BR">
<head>

    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chefia de Divisão SPU/UF</title>
    <link rel="stylesheet" href="manifestacao-styles.css?v=1782355313469">
</head>
<body>
    <div class="container">
        <section class="card etapa-card">
            <header class="card-header etapa-header">
                <div class="titulo">
                    <span class="icone">📋</span>
                    <span>Chefia de Divisão SPU/UF</span>
                </div>
                <div class="acoes">
                    <span class="status status-pendente">⏳ Pendente</span>
                    <span class="seta">▲</span>
                </div>
            </header>

            <div class="card-body etapa-body">
                <div class="origem info-origem">
                    Origem: <span style="font-weight: bold;">Técnico Responsável</span>, em <span style="font-weight: bold;">25/05/2026 10:15</span>
                </div>
                
                <hr style="margin-top: 30px; margin-bottom: 30px; border: 0; border-top: 1px solid #eee;">
                
                <div class="pergunta">Declaro que:</div>

                <div class="opcoes radio-group">
                    <div>
                        <label class="opcao radio-option">
                            <input type="radio" name="declaracao" value="suficiente" />
                            <span class="opcao-texto">
                                Os elementos constantes do formulário são suficientes para apreciação dos aspectos de mérito da destinação proposta.
                            </span>
                        </label>
                    </div>
                    <div>
                        <label class="opcao radio-option">
                            <input type="radio" name="declaracao" value="insuficiente" />
                            <span class="opcao-texto">
                                NÃO há elementos suficientes para apreciação dos aspectos de mérito da destinação proposta, sendo necessária a complementação das informações.
                            </span>
                        </label>
                    </div>
                    <div>
                        <label class="opcao radio-option">
                            <input type="radio" name="declaracao" value="devolver_equipe" />
                            <span class="opcao-texto">Devolver para Equipe SPU/UF.</span>
                        </label>
                    </div>
                </div>

                <div class="campo-observacoes">
                    <label for="observacoes">Observações:</label>
                    <textarea id="observacoes" placeholder="Registre eventuais ressalvas, condicionantes, inconsistências identificadas ou orientações para complementação da proposta."></textarea>
                </div>

                <button class="botao-concluir" type="button" disabled>
                    ✍ Concluir manifestação
                </button>
            </div>
        </section>
    </div>
    <script src="manifestacao-scripts.js?v=1782355313469"></script>
    <script src="sync.js?v=1782355313469"></script>
</body>
</html>
